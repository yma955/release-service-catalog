---
apiVersion: appstudio.redhat.com/v1alpha1
kind: ReleasePlanAdmission
metadata:
  name: ${release_plan_admission_name}
  labels:
    originating-tool: "${originating_tool}"
spec:
  applications:
    - ${application_name}
  data:
    intention: "staging"
    pulp:
      domain: konflux-release-integration-tests
      secretName: pulp-credentials-${component_name}
    mapping:
      components:
        - name: ${component_name}
          contentType: rpm
    atlas:
      server: stage
      atlas-sso-secret-name: atlas-staging-sso-secret-${component_name}
      atlas-retry-aws-secret-name: atlas-retry-s3-staging-secret-${component_name}
    pyxis:
      server: stage
      secret: pyxis-${component_name}
    sign:
      configMapName: "hacbs-signing-pipeline-config-staging-e2e"
      cosignSecretName: "konflux-cosign-signing-stage-${component_name}"
    releaseNotes:
      product_id:
        - 932
      product_name: "${application_name}"
      product_version: "1.0.1"
      product_stream: "${component_type}-1.0"
      cpe: "cpe:/a:${application_name}:${component_type}:1.0.1"
      type: "RHBA"
      synopsis: "${application_name} 1.0.1 release"
      topic: "test topic"
      description: "${application_name} 1.0.1 release"
      solution: "${application_name} 1.0.1 release"
      references:
        - "https://github.com/${component_github_org}/${component_name}/releases/tag/1.0.1"
  origin: ${tenant_namespace}
  pipeline:
    pipelineRef:
      params:
        - name: url
          value: "${RELEASE_CATALOG_GIT_URL}"
        - name: revision
          value: "${RELEASE_CATALOG_GIT_REVISION}"
        - name: pathInRepo
          value: pipelines/managed/push-rpms-to-pulp/push-rpms-to-pulp.yaml
      resolver: git
    serviceAccountName: ${managed_sa_name}
    timeouts:
      pipeline: 4h0m0s
      tasks: 4h0m0s
  policy: standard-${component_name}
