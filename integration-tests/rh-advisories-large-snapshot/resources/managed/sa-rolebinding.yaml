---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: release-service-account-${managed_sa_name}
  labels:
    originating-tool: "${originating_tool}"
subjects:
  - kind: ServiceAccount
    name: ${managed_sa_name}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: release-service-account-managed
