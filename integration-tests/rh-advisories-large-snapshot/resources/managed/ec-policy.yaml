---
apiVersion: appstudio.redhat.com/v1alpha1
kind: EnterpriseContractPolicy
metadata:
  name: standard-${component_name}
  labels:
    originating-tool: "${originating_tool}"
spec:
  description: >-
    Enterprise Contract policy for large snapshot testing.
    This policy is more lenient to allow testing of large snapshots
    without being blocked by policy violations on old snapshots.
  publicKey: k8s://openshift-pipelines/public-key
  sources:
    - name: Release Policies
      data:
        - oci::quay.io/konflux-ci/tekton-catalog/data-acceptable-bundles:latest
      policy:
        - oci::quay.io/konflux-ci/tekton-catalog/release-policy:latest
  configuration:
    include:
      - '@minimal'
    exclude:
      # Exclude checks that may fail for old/test snapshots
      - not_useful
      - test
      # Skip time-based checks for large snapshots
      - attestation_task_bundle.disallowed_task_reference
      # Skip some signing checks for test
      - attestation_signature_check.signature_check
