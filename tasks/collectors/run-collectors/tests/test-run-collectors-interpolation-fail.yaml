---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-run-collectors-interpolation-fail
  annotations:
    test/assert-task-failure: "run-task"
spec:
  description: |
    Verify that collectors task fails when template variable is not found in Release CR (KONFLUX-11658)
  workspaces:
    - name: tests-workspace
  tasks:
    - name: setup
      workspaces:
        - name: data
          workspace: tests-workspace
      taskSpec:
        workspaces:
          - name: data
        steps:
          - name: create-crs
            image: quay.io/konflux-ci/release-service-utils@sha256:5546fa78d3c88d7b6a2e8cff8902f7757f00541d0bbaf113b9f293133894afa3
            script: |
              #!/usr/bin/env bash
              set -eux

              mkdir "$(workspaces.data.path)"/results

              # ReleasePlan with template variable pointing to non-existent path
              cat > "$(workspaces.data.path)"/test_release_plan.json << EOF
              {
                "apiVersion": "appstudio.redhat.com/v1alpha1",
                "kind": "ReleasePlan",
                "metadata": {
                  "name": "test-rp",
                  "namespace": "default"
                },
                "spec": {
                  "application": "app",
                  "collectors": {
                    "items": [
                      {
                        "name": "test-collector",
                        "type": "dummy-collector",
                        "timeout": 600,
                        "params": [
                          {
                            "name": "query",
                            "value": "fixVersion = \"{{ spec.data.nonexistent.path }}\""
                          }
                        ]
                      }
                    ],
                    "target": "managed"
                  }
                }
              }
              EOF

              # Release CR WITHOUT the expected data path
              cat > "$(workspaces.data.path)"/release.json << EOF
              {
                "apiVersion": "appstudio.redhat.com/v1alpha1",
                "kind": "Release",
                "metadata": {
                  "name": "test-release",
                  "namespace": "default"
                },
                "spec": {
                  "snapshot": "test-snapshot",
                  "releasePlan": "test-rp",
                  "data": {}
                }
              }
              EOF

              cat > "$(workspaces.data.path)"/previous_release.json << EOF
              {}
              EOF
    - name: run-task
      taskRef:
        name: run-collectors
      params:
        - name: collectorsPath
          value: test_release_plan.json
        - name: collectorsRepository
          value: test_repo
        - name: collectorsResourceType
          value: releaseplan
        - name: resultsDir
          value: results
        - name: releasePath
          value: release.json
        - name: previousReleasePath
          value: previous_release.json
      runAfter:
        - setup
      workspaces:
        - name: data
          workspace: tests-workspace
