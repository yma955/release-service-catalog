---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-filter-already-released-advisory-rpms-noarch
spec:
  description: |
    Run filter-already-released-advisory-rpms with only noarch RPMs and verify that
    DEFAULT_ARCHITECTURES is used to determine target repositories when no arch-specific
    RPMs are present. Only architectures with matching rpm-repositories entries are used.
  params:
    - name: ociStorage
      description: The OCI repository where the Trusted Artifacts are stored.
      type: string
    - name: ociArtifactExpiresAfter
      description: Expiration date for the trusted artifacts created in the
        OCI repository. An empty string means the artifacts do not expire.
      type: string
      default: "1d"
    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls
      type: string
      default: "--insecure"
    - name: trustedArtifactsDebug
      description: Flag to enable debug logging in trusted artifacts. Set to a non-empty string to enable.
      type: string
      default: ""
    - name: dataDir
      description: The location where data will be stored
      type: string
  tasks:
    - name: setup
      taskSpec:
        results:
          - name: sourceDataArtifact
            type: string
        volumes:
          - name: workdir
            emptyDir: {}
        stepTemplate:
          volumeMounts:
            - mountPath: /var/workdir
              name: workdir
          env:
            - name: HOME
              value: /var/workdir
            - name: IMAGE_EXPIRES_AFTER
              value: $(params.ociArtifactExpiresAfter)
            - name: ORAS_OPTIONS
              value: "$(params.orasOptions)"
            - name: DEBUG
              value: "$(params.trustedArtifactsDebug)"
        steps:
          - name: setup-values
            image: quay.io/konflux-ci/release-service-utils@sha256:304058ae848ca6311b53b505e80533fc337e9c1a46dedd4071ee436b14e476d9  # yamllint disable-line rule:line-length
            script: |
              #!/usr/bin/env bash
              set -eux

              mkdir -p "$(params.dataDir)/$(context.pipelineRun.uid)"

              # Create snapshot file
              cat > "$(params.dataDir)/$(context.pipelineRun.uid)/snapshot_spec.json" << EOF
              {
                "application": "rpms",
                "artifacts": {},
                "components": [
                  {
                    "containerImage": "quay.io/test/noarchonly@sha256:12345",
                    "name": "noarch-test"
                  }
                ]
              }
              EOF

              # Create data file with rpm-repositories mapping
              # Only x86_64 and aarch64 have mappings - ppc64le and s390x should be ignored
              cat > "$(params.dataDir)/$(context.pipelineRun.uid)/data.json" << EOF
              {
                "mapping": {
                  "rpm-repositories": [
                    {
                      "name": "rpm-x86_64",
                      "arch": "x86_64",
                      "repository_id": "rpm-x86_64",
                      "repository_name": "x86_64",
                      "distro": "testdistro"
                    },
                    {
                      "name": "rpm-aarch64",
                      "arch": "aarch64",
                      "repository_id": "rpm-aarch64",
                      "repository_name": "aarch64",
                      "distro": "testdistro"
                    },
                    {
                      "name": "rpm-source",
                      "arch": "source",
                      "repository_id": "rpm-source",
                      "repository_name": "source",
                      "distro": "testdistro"
                    }
                  ]
                }
              }
              EOF
          - name: create-trusted-artifact
            ref:
              name: create-trusted-artifact
            params:
              - name: ociStorage
                value: $(params.ociStorage)
              - name: workDir
                value: $(params.dataDir)
              - name: sourceDataArtifact
                value: $(results.sourceDataArtifact.path)
    - name: run-task
      taskRef:
        name: filter-already-released-advisory-rpms
      params:
        - name: snapshotPath
          value: "$(context.pipelineRun.uid)/snapshot_spec.json"
        - name: dataPath
          value: "$(context.pipelineRun.uid)/data.json"
        - name: PULP_DOMAIN
          value: "mydomain"
        - name: PULP_SECRET_NAME
          value: "pulp-task-pulp-secret"
        - name: ociStorage
          value: $(params.ociStorage)
        - name: orasOptions
          value: $(params.orasOptions)
        - name: sourceDataArtifact
          value: "$(tasks.setup.results.sourceDataArtifact)=$(params.dataDir)"
        - name: dataDir
          value: $(params.dataDir)
        - name: trustedArtifactsDebug
          value: $(params.trustedArtifactsDebug)
        - name: taskGitUrl
          value: "http://localhost"
        - name: taskGitRevision
          value: "main"
      runAfter:
        - setup
    - name: check-result
      params:
        - name: sourceDataArtifact
          value: "$(tasks.run-task.results.sourceDataArtifact)=$(params.dataDir)"
        - name: dataDir
          value: $(params.dataDir)
      taskSpec:
        params:
          - name: sourceDataArtifact
            type: string
          - name: dataDir
            type: string
        volumes:
          - name: workdir
            emptyDir: {}
        stepTemplate:
          volumeMounts:
            - mountPath: /var/workdir
              name: workdir
          env:
            - name: HOME
              value: /var/workdir
            - name: IMAGE_EXPIRES_AFTER
              value: $(params.ociArtifactExpiresAfter)
            - name: ORAS_OPTIONS
              value: "$(params.orasOptions)"
            - name: DEBUG
              value: "$(params.trustedArtifactsDebug)"
        steps:
          - name: use-trusted-artifact
            ref:
              name: use-trusted-artifact
            params:
              - name: workDir
                value: $(params.dataDir)
              - name: sourceDataArtifact
                value: $(params.sourceDataArtifact)
          - name: check-result
            image: quay.io/konflux-ci/release-service-utils@sha256:304058ae848ca6311b53b505e80533fc337e9c1a46dedd4071ee436b14e476d9  # yamllint disable-line rule:line-length
            script: |
              #!/usr/bin/env bash
              set -eux

              snap="$(cat "$(params.dataDir)/$(context.pipelineRun.uid)/snapshot_spec.json")"
              echo "$snap" | jq .

              # Should keep the component with rpmsToPublish
              test "$(echo "$snap" | jq '.components | length')" = "1"

              # Should have 2 noarch RPMs to publish
              rpms_count=$(echo "$snap" | jq '.components[0].rpmsToPublish | length')
              test "${rpms_count}" = "2"

              # Verify each noarch RPM targets only the repos defined in rpm-repositories
              # mapping (x86_64 and aarch64 only, NOT ppc64le or s390x)
              noarch_count=0
              while IFS= read -r noarch_rpm; do
                # Verify arch is noarch
                test "$(echo "$noarch_rpm" | jq -r '.arch')" = "noarch"

                # Each noarch RPM should target only the 2 architectures with mappings
                target_count=$(echo "$noarch_rpm" | jq '.targetRepos | length')
                test "${target_count}" = "2"

                # Verify targetRepos is array of objects with repository_id, repository_name, distro
                # Check that each target has all fields
                for i in 0 1; do
                  repo_id=$(echo "$noarch_rpm" | jq -r ".targetRepos[${i}].repository_id")
                  repo_name=$(echo "$noarch_rpm" | jq -r ".targetRepos[${i}].repository_name")
                  repo_distro=$(echo "$noarch_rpm" | jq -r ".targetRepos[${i}].distro")
                  test -n "${repo_id}" && test "${repo_id}" != "null"
                  test -n "${repo_name}" && test "${repo_name}" != "null"
                  test -n "${repo_distro}" && test "${repo_distro}" != "null"
                done

                # Verify the correct repository_ids are used (sorted for comparison)
                repo_ids=$(echo "$noarch_rpm" | jq -r '[.targetRepos[].repository_id] | sort | join(",")')
                test "${repo_ids}" = "rpm-aarch64,rpm-x86_64"

                # Verify the correct repository_names are used (sorted for comparison)
                repo_names=$(echo "$noarch_rpm" | jq -r '[.targetRepos[].repository_name] | sort | join(",")')
                test "${repo_names}" = "aarch64,x86_64"

                noarch_count=$((noarch_count + 1))
              done < <(echo "$snap" | jq -c '.components[0].rpmsToPublish[]')

              # Should have exactly 2 noarch RPMs
              test "${noarch_count}" = "2"

              echo "Noarch RPM test passed: targetRepos contains objects with repository_id and repository_name"
      runAfter:
        - run-task
