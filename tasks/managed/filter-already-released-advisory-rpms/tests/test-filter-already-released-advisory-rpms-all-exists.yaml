---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-filter-already-released-advisory-rpms-all-exists
spec:
  description: |
    Run filter-already-released-advisory-rpms where all RPMs already exist
    in Pulp and verify snapshot is reduced to 0 components.
  params:
    - name: ociStorage
      description: The OCI repository where the Trusted Artifacts are stored.
      type: string
    - name: ociArtifactExpiresAfter
      description: Expiration date for the trusted artifacts created in the
        OCI repository. An empty string means the artifacts do not expire.
      type: string
      default: "1d"
    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls
      type: string
      default: "--insecure"
    - name: trustedArtifactsDebug
      description: Flag to enable debug logging in trusted artifacts. Set to a non-empty string to enable.
      type: string
      default: ""
    - name: dataDir
      description: The location where data will be stored
      type: string
  tasks:
    - name: setup
      taskSpec:
        results:
          - name: sourceDataArtifact
            type: string
        volumes:
          - name: workdir
            emptyDir: {}
        stepTemplate:
          volumeMounts:
            - mountPath: /var/workdir
              name: workdir
          env:
            - name: HOME
              value: /var/workdir
            - name: IMAGE_EXPIRES_AFTER
              value: $(params.ociArtifactExpiresAfter)
            - name: ORAS_OPTIONS
              value: "$(params.orasOptions)"
            - name: DEBUG
              value: "$(params.trustedArtifactsDebug)"
        steps:
          - name: setup-values
            image: quay.io/konflux-ci/release-service-utils@sha256:304058ae848ca6311b53b505e80533fc337e9c1a46dedd4071ee436b14e476d9  # yamllint disable-line rule:line-length
            script: |
              #!/usr/bin/env bash
              set -eux

              mkdir -p "$(params.dataDir)/$(context.pipelineRun.uid)"

              # Create data file with rpm-repositories mapping
              cat > "$(params.dataDir)/$(context.pipelineRun.uid)/data.json" << EOF
              {
                "mapping": {
                  "rpm-repositories": [
                    {
                      "name": "rpm-x86_64",
                      "arch": "x86_64",
                      "repository_id": "rpm-x86_64",
                      "repository_name": "x86_64",
                      "distro": "testdistro"
                    },
                    {
                      "name": "rpm-aarch64",
                      "arch": "aarch64",
                      "repository_id": "rpm-aarch64",
                      "repository_name": "aarch64",
                      "distro": "testdistro"
                    },
                    {
                      "name": "rpm-ppc64le",
                      "arch": "ppc64le",
                      "repository_id": "rpm-ppc64le",
                      "repository_name": "ppc64le",
                      "distro": "testdistro"
                    },
                    {
                      "name": "rpm-s390x",
                      "arch": "s390x",
                      "repository_id": "rpm-s390x",
                      "repository_name": "s390x",
                      "distro": "testdistro"
                    },
                    {
                      "name": "rpm-source",
                      "arch": "source",
                      "repository_id": "rpm-source",
                      "repository_name": "source",
                      "distro": "testdistro"
                    }
                  ]
                }
              }
              EOF

              # Create snapshot file
              cat > "$(params.dataDir)/$(context.pipelineRun.uid)/snapshot_spec.json" << EOF
              {
                "application": "rpms",
                "artifacts": {},
                "components": [
                  {
                    "containerImage": "quay.io/test/alreadyexists@sha256:12345",
                    "name": "test"
                  }
                ]
              }
              EOF
          - name: create-trusted-artifact
            ref:
              name: create-trusted-artifact
            params:
              - name: ociStorage
                value: $(params.ociStorage)
              - name: workDir
                value: $(params.dataDir)
              - name: sourceDataArtifact
                value: $(results.sourceDataArtifact.path)
    - name: run-task
      taskRef:
        name: filter-already-released-advisory-rpms
      params:
        - name: snapshotPath
          value: "$(context.pipelineRun.uid)/snapshot_spec.json"
        - name: dataPath
          value: "$(context.pipelineRun.uid)/data.json"
        - name: PULP_DOMAIN
          value: "mydomain"
        - name: PULP_SECRET_NAME
          value: "pulp-task-pulp-secret"
        - name: ociStorage
          value: $(params.ociStorage)
        - name: orasOptions
          value: $(params.orasOptions)
        - name: sourceDataArtifact
          value: "$(tasks.setup.results.sourceDataArtifact)=$(params.dataDir)"
        - name: dataDir
          value: $(params.dataDir)
        - name: trustedArtifactsDebug
          value: $(params.trustedArtifactsDebug)
        - name: taskGitUrl
          value: "http://localhost"
        - name: taskGitRevision
          value: "main"
      runAfter:
        - setup
    - name: check-result
      params:
        - name: sourceDataArtifact
          value: "$(tasks.run-task.results.sourceDataArtifact)=$(params.dataDir)"
        - name: skip_release
          value: $(tasks.run-task.results.skip_release)
        - name: dataDir
          value: $(params.dataDir)
      taskSpec:
        params:
          - name: sourceDataArtifact
            type: string
          - name: skip_release
            type: string
          - name: dataDir
            type: string
        volumes:
          - name: workdir
            emptyDir: {}
        stepTemplate:
          volumeMounts:
            - mountPath: /var/workdir
              name: workdir
          env:
            - name: HOME
              value: /var/workdir
            - name: IMAGE_EXPIRES_AFTER
              value: $(params.ociArtifactExpiresAfter)
            - name: ORAS_OPTIONS
              value: "$(params.orasOptions)"
            - name: DEBUG
              value: "$(params.trustedArtifactsDebug)"
        steps:
          - name: use-trusted-artifact
            ref:
              name: use-trusted-artifact
            params:
              - name: workDir
                value: $(params.dataDir)
              - name: sourceDataArtifact
                value: $(params.sourceDataArtifact)
          - name: check-result
            image: quay.io/konflux-ci/release-service-utils@sha256:304058ae848ca6311b53b505e80533fc337e9c1a46dedd4071ee436b14e476d9  # yamllint disable-line rule:line-length
            script: |
              #!/usr/bin/env bash
              set -eux

              # Check that skip_release is set to true when all RPMs already exist
              if [ "$(params.skip_release)" != "true" ]; then
                echo "skip_release should be true when all RPMs are already released"
                exit 1
              fi

              snap="$(cat "$(params.dataDir)/$(context.pipelineRun.uid)/snapshot_spec.json")"
              echo "$snap" | jq .
              test "$(echo "$snap" | jq '.components | length')" = "0"
      runAfter:
        - run-task
