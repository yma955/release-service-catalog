---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: push-oot-kmods-to-git
spec:
  description: >-
    Task to upload out-of-tree kernel modules to a private vendor git repo
  params:
    - name: signedKmodsPath
      type: string
      description: Path where the kernel modules are stored relative to the dataDir
    - name: dataDir
      type: string
      description: The absolute path to the working directory
      default: /var/workdir/release
    - name: gitRepoUrl
      type: string
      description: Repository URL where the artifacts will be pushed
    - name: gitBranch
      type: string
      description: Specific branch in the repository
    - name: gitTokenSecret
      type: string
      description: The name of the Kubernetes secret containing the Git token
    - name: sourceDataArtifact
      type: string
      description: OCI reference to the trusted artifact containing the dataDir contents
    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls
      type: string
      default: ""
    - name: trustedArtifactsDebug
      description: Flag to enable debug logging in trusted artifacts. Set to a non-empty string to enable
      type: string
      default: ""
    - name: taskGitUrl
      type: string
      description: The git repository URL for StepAction resolution
      default: https://github.com/konflux-ci/release-service-catalog.git
    - name: taskGitRevision
      type: string
      description: The git revision for StepAction resolution
      default: main
  volumes:
    - name: workdir
      emptyDir: {}
    - name: git-token-secret-vol
      secret:
        secretName: $(params.gitTokenSecret)
  stepTemplate:
    securityContext:
      runAsUser: 1001
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
    env:
      - name: "ORAS_OPTIONS"
        value: "$(params.orasOptions)"
      - name: "DEBUG"
        value: "$(params.trustedArtifactsDebug)"
  steps:
    - name: use-trusted-artifact
      computeResources:
        limits:
          memory: 256Mi
        requests:
          memory: 256Mi
          cpu: 100m
      ref:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: stepactions/use-trusted-artifact/use-trusted-artifact.yaml
      params:
        - name: workDir
          value: $(params.dataDir)
        - name: sourceDataArtifact
          value: $(params.sourceDataArtifact)
    - name: push-to-git
      image: quay.io/konflux-ci/release-service-utils@sha256:5546fa78d3c88d7b6a2e8cff8902f7757f00541d0bbaf113b9f293133894afa3
      computeResources:
        limits:
          memory: 1Gi
        requests:
          memory: 1Gi
          cpu: 250m
      volumeMounts:
        - name: git-token-secret-vol
          mountPath: /var/secrets/git-token
          readOnly: true
      script: |
        #!/usr/bin/env bash
        set -euxo pipefail

        PUSH_TOKEN=$(cat /var/secrets/git-token/gitlab-gr-maintenance-token)
        SIGNED_KMODS_PATH="$(params.dataDir)/$(params.signedKmodsPath)"
        REPO_URL="$(params.gitRepoUrl)"
        GIT_WORK_DIR="$(params.dataDir)/git-work"

        mkdir -p "${SIGNED_KMODS_PATH}"
        mkdir -p "${GIT_WORK_DIR}"
        cd "${GIT_WORK_DIR}"

        # Check if this is a multi-architecture build
        if [ -f "$(params.dataDir)/arch_count.txt" ]; then
            arch_count=$(cat "$(params.dataDir)/arch_count.txt")
            echo "Processing $arch_count architecture(s) for Git upload"
        else
            echo "No architecture information found, assuming single architecture"
            arch_count=1
        fi

        export GIT_LFS_SKIP_SMUDGE=1
        set +x # disable logging of the token
        PUSH_TOKEN_CLEAN=$(printf "%s" "$PUSH_TOKEN" | tr -d '\n')
        GIT_URL_WITH_AUTH="https://gitlab-ci-token:${PUSH_TOKEN_CLEAN}@${REPO_URL}"
        git clone --depth=1 --filter=blob:none --no-checkout \
          --single-branch --branch "$(params.gitBranch)" \
          "$GIT_URL_WITH_AUTH" local-artifacts
        set -x # enable logging after the token is added to the URL

        cd local-artifacts
        git sparse-checkout init --cone
        git config user.email "partner-accelerators@konflux-ci.redhat.com"
        git config user.name "Partner Accelerators CI Bot"

        # Function to push artifacts for a specific architecture
        push_arch_artifacts() {
            local arch_name="$1"
            local source_dir="$2"

            echo "Processing artifacts for architecture directory: $arch_name"

            # Read envfile to get version information and ARCH override
            if [ -f "$source_dir/envfile" ]; then
                # shellcheck source=/dev/null
                . "$source_dir/envfile"
            else
                echo "ERROR: envfile not found in $source_dir"
                return 1
            fi

            # Strip architecture suffix from KERNEL_VERSION (e.g., .aarch64+64k, .x86_64)
            KERNEL_VERSION_CLEAN=$(echo "$KERNEL_VERSION" | \
              sed -E 's/\.(x86_64|amd64|aarch64|arm64|ppc64le|s390x)(\+.*)?$//')
            echo "Original KERNEL_VERSION: $KERNEL_VERSION"
            echo "Cleaned KERNEL_VERSION: $KERNEL_VERSION_CLEAN"

            # Use ARCH from envfile if available and not MULTI_PLATFORM, otherwise fall back to directory name
            if [ -n "${ARCH:-}" ] && [ "$ARCH" != "MULTI_PLATFORM" ]; then
                local final_arch="$ARCH"
                echo "Using architecture: $final_arch (from envfile ARCH variable)"
            else
                local final_arch="$arch_name"
                if [ "${ARCH:-}" = "MULTI_PLATFORM" ]; then
                    echo "Using architecture: $final_arch (ARCH=MULTI_PLATFORM, using directory name)"
                else
                    echo "Using architecture: $final_arch (from directory name)"
                fi
            fi
            local arch_suffix="/${final_arch}"

            TARGET_DIR="${DRIVER_VENDOR}/${DRIVER_VERSION}/${KERNEL_VERSION_CLEAN}${arch_suffix}"
            echo "Target directory: $TARGET_DIR"

            git sparse-checkout add "$TARGET_DIR"
            git checkout
            mkdir -p "$TARGET_DIR"

            # Copy .ko files (preserving directory structure)
            if find "$source_dir" -name "*.ko" -type f | head -1 | grep -q "."; then
                echo "Copying .ko files with preserved directory structure for $arch_name..."

                # Copy entire directory structure containing .ko files
                cd "$source_dir"
                find . -name "*.ko" -type f | while read -r ko_file; do
                    ko_dir=$(dirname "$ko_file")
                    mkdir -p "$TARGET_DIR/$ko_dir"
                    cp "$ko_file" "$TARGET_DIR/$ko_file"
                done
                cd - > /dev/null
                ko_file_count=$(find "$TARGET_DIR" -name "*.ko" -type f | wc -l)
                echo "Copied $ko_file_count .ko files for $arch_name (preserving directory structure)"

                # Show directory structure for verification
                echo "Directory structure copied for $arch_name:"
                find "$TARGET_DIR" -name "*.ko" -type f | sort | head -10 | sed 's|^|  |'
                if [ "$(find "$TARGET_DIR" -name "*.ko" -type f | wc -l)" -gt 10 ]; then
                    echo "  ... (showing first 10 files)"
                fi
            else
                echo "WARNING: No .ko files found for $arch_name"
                return 1
            fi

            # Copy architecture-specific checksum file (always use arch suffix)
            if [ -f "$source_dir/signed_kmods_checksums_${arch_name}.txt" ]; then
                cp "$source_dir/signed_kmods_checksums_${arch_name}.txt" "$TARGET_DIR/"
                echo "Copied architecture-specific checksums for $arch_name"
            fi

            # Copy envfile for reference
            if [ -f "$source_dir/envfile" ]; then
                cp "$source_dir/envfile" "$TARGET_DIR/"
                echo "Copied envfile for $arch_name"
            fi

            # Add files to git
            git add "$TARGET_DIR"

            return 0
        }

        # Process architectures
        if [ "$arch_count" -gt 1 ]; then
            echo "Multi-architecture build detected, processing each architecture"

            # Verify we have the signing summary
            if [ -f "${SIGNED_KMODS_PATH}/signing_summary.txt" ]; then
                echo "Signing summary found:"
                cat "${SIGNED_KMODS_PATH}/signing_summary.txt"
            fi

            # Process each architecture directory
            for arch_dir in "${SIGNED_KMODS_PATH}"/*/; do
                if [ -d "$arch_dir" ]; then
                    arch_name=$(basename "$arch_dir")
                    echo "Processing Git upload for architecture: $arch_name"

                    if push_arch_artifacts "$arch_name" "$arch_dir"; then
                        echo "Successfully processed $arch_name"
                    else
                        echo "ERROR: Failed to process $arch_name"
                        exit 1
                    fi
                fi
            done

            # Create multi-arch summary file in the repository
            if [ -f "${SIGNED_KMODS_PATH}/signing_summary.txt" ]; then
                # Use first architecture's envfile for base path information
                first_arch_dir=$(find "${SIGNED_KMODS_PATH}" -mindepth 1 -maxdepth 1 -type d | head -1)
                if [ -n "$first_arch_dir" ] && [ -f "$first_arch_dir/envfile" ]; then
                    # shellcheck source=/dev/null
                    . "$first_arch_dir/envfile"
                    # Strip architecture suffix from KERNEL_VERSION
                    KERNEL_VERSION_CLEAN=$(echo "$KERNEL_VERSION" | \
                      sed -E 's/\.(x86_64|amd64|aarch64|arm64|ppc64le|s390x)(\+.*)?$//')
                    summary_target_dir="${DRIVER_VENDOR}/${DRIVER_VERSION}/${KERNEL_VERSION_CLEAN}/multi-arch-summary"

                    echo "Creating multi-architecture summary in Git: ${summary_target_dir}"
                    git sparse-checkout add "$summary_target_dir"
                    mkdir -p "$summary_target_dir"
                    cp "${SIGNED_KMODS_PATH}/signing_summary.txt" "$summary_target_dir/"
                    cp "${SIGNED_KMODS_PATH}/extraction_summary.txt" "$summary_target_dir/" 2>/dev/null || true
                    git add "$summary_target_dir"
                fi
            fi

        else
            echo "Single architecture build, using standard upload"

            # Get the actual architecture directory name
            arch_dir=$(find "${SIGNED_KMODS_PATH}" -mindepth 1 -maxdepth 1 -type d | head -1)
            if [ -z "$arch_dir" ]; then
                echo "ERROR: No architecture directory found in ${SIGNED_KMODS_PATH}"
                exit 1
            fi
            actual_arch=$(basename "$arch_dir")
            echo "Detected architecture: $actual_arch"

            cd "$arch_dir"
            # Validate checksum file exists for single-arch (arch-specific filename)
            if [ ! -f "signed_kmods_checksums_${actual_arch}.txt" ]; then
                echo "ERROR: signed_kmods_checksums_${actual_arch}.txt not found for single architecture build"
                exit 1
            fi

            # Verify checksums
            sha256sum -c "signed_kmods_checksums_${actual_arch}.txt"
            cd "${GIT_WORK_DIR}/local-artifacts"

            if push_arch_artifacts "$actual_arch" "$arch_dir"; then
                echo "Successfully processed single architecture: $actual_arch"
            else
                echo "ERROR: Failed to process single architecture: $actual_arch"
                exit 1
            fi
        fi

        # Commit and push all changes with retry logic to handle race conditions
        if git status --porcelain | grep -q '^[ AM]'; then
            commit_message="Automated push from Build and Sign pipeline"
            if [ "$arch_count" -gt 1 ]; then
                commit_message="$commit_message (multi-arch: $arch_count architectures)"
            fi

            git commit -m "$commit_message"

            # Get batch size from envfile for retry attempts (default to 1 if not set)
            max_attempts="${BATCH_SIZE:-1}"
            echo "Using BATCH_SIZE=${max_attempts} for push retry attempts"

            attempt=1
            push_success=false

            while [ $attempt -le "$max_attempts" ]; do
                echo "Push attempt $attempt of $max_attempts"

                if git push -u origin "$(params.gitBranch)"; then
                    echo "Successfully pushed artifacts for $arch_count architecture(s) to Git on attempt $attempt"
                    push_success=true
                    break
                else
                    echo "Push failed on attempt $attempt"

                    if [ $attempt -lt "$max_attempts" ]; then
                        echo "Pulling latest changes and retrying..."
                        # Pull with rebase to incorporate remote changes
                        git pull --rebase origin "$(params.gitBranch)"
                        attempt=$((attempt + 1))
                        # Add small delay to reduce contention
                        sleep 2
                    else
                        echo "ERROR: Failed to push after $max_attempts attempts"
                        exit 1
                    fi
                fi
            done

            if [ "$push_success" = false ]; then
                echo "ERROR: Failed to push artifacts to Git"
                exit 1
            fi
        else
            echo "No changes to commit."
        fi
