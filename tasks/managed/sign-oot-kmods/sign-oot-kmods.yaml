---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: sign-oot-kmods
  annotations:
    tekton.dev/pipelines.minVersion: "0.12.1"
    tekton.dev/tags: release
spec:
  description: >-
    Task to sign out-of-tree kernel modules using the internal signing server
  params:
    - name: dataPath
      type: string
      description: Path to the data JSON in the data workspace
    - name: signedKmodsPath
      type: string
      description: Path where the kernel modules are stored in the workspace
    - name: kerberosRealm
      type: string
      description: Name of the key used to sign the kernel modules
    - name: signingAuthor
      type: string
      description: Human name responsible for the signing process
    - name: checksumFingerprint
      type: string
      description: Secret containing the host key database for SSH the server running signing
    - name: checksumKeytab
      type: string
      description: Secret containing keytab file for the Kerberos user / server
    - name: signing-secret
      type: string
      description: Secret containing the fields signHost, SignKey and SignUser
    - name: ociStorage
      description: The OCI repository where the Trusted Artifacts are stored
      type: string
      default: "empty"
    - name: ociArtifactExpiresAfter
      description: Expiration date for the trusted artifacts created in the
        OCI repository. An empty string means the artifacts do not expire
      type: string
      default: "1d"
    - name: trustedArtifactsDebug
      description: Flag to enable debug logging in trusted artifacts. Set to a non-empty string to enable
      type: string
      default: ""
    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls
      type: string
      default: ""
    - name: sourceDataArtifact
      type: string
      description: Location of trusted artifacts to be used to populate data directory
      default: ""
    - name: dataDir
      description: The location where data will be stored
      type: string
      default: /var/workdir/release
    - name: taskGitUrl
      type: string
      description: The git repository URL for task and StepAction resolution
      default: https://github.com/konflux-ci/release-service-catalog.git
    - name: taskGitRevision
      type: string
      description: The git revision for task and StepAction resolution
      default: main
    - name: caTrustConfigMapName
      type: string
      description: The name of the ConfigMap to read CA bundle data from
      default: trusted-ca
    - name: caTrustConfigMapKey
      type: string
      description: The name of the key in the ConfigMap that contains the CA bundle data
      default: ca-bundle.crt
  results:
    - name: sourceDataArtifact
      type: string
      description: Produced trusted data artifact
  volumes:
    - name: bs-keytab
      secret:
        secretName: $(params.checksumKeytab)
        defaultMode: 0444
    - name: checksum-fingerprint
      secret:
        secretName: $(params.checksumFingerprint)
        defaultMode: 0444
    - name: signing-secret-vol
      secret:
        secretName: $(params.signing-secret)
        defaultMode: 0444
    - name: workdir
      emptyDir: {}
    - name: trusted-ca
      configMap:
        name: $(params.caTrustConfigMapName)
        items:
          - key: $(params.caTrustConfigMapKey)
            path: ca-bundle.crt
        optional: true
  stepTemplate:
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
      - name: trusted-ca
        mountPath: /mnt/trusted-ca
        readOnly: true
    env:
      - name: IMAGE_EXPIRES_AFTER
        value: $(params.ociArtifactExpiresAfter)
      - name: "ORAS_OPTIONS"
        value: "$(params.orasOptions)"
      - name: "DEBUG"
        value: "$(params.trustedArtifactsDebug)"
  steps:
    - name: use-trusted-artifact
      computeResources:
        limits:
          memory: 64Mi
        requests:
          memory: 64Mi
          cpu: 30m
      ref:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: stepactions/use-trusted-artifact/use-trusted-artifact.yaml
      params:
        - name: workDir
          value: $(params.dataDir)
        - name: sourceDataArtifact
          value: $(params.sourceDataArtifact)
    - name: sign-files
      image: quay.io/konflux-ci/release-service-utils@sha256:5546fa78d3c88d7b6a2e8cff8902f7757f00541d0bbaf113b9f293133894afa3
      computeResources:
        limits:
          memory: 512Mi
        requests:
          memory: 512Mi
          cpu: 250m
      volumeMounts:
        - name: checksum-fingerprint
          mountPath: "/etc/sec-checksum"
        - name: bs-keytab
          mountPath: "/etc/sec-keytab"
        - name: signing-secret-vol
          mountPath: "/etc/secrets"
      script: |
        #!/usr/bin/env bash
        set -eu

        signKey="$(cat /etc/secrets/signKey)"
        signHost="$(cat /etc/secrets/signHost)"
        signUser="$(cat /etc/secrets/signUser)"

        set -x

        signedKmodsPath="$(params.signedKmodsPath)"
        signingAuthor="$(params.signingAuthor)"
        # Remove newline in signing variables
        signUser="${signUser//$'\n'/}"
        signHost="${signHost//$'\n'/}"

        echo "Signing OOT modules from $(params.dataDir)/$signedKmodsPath.."
        SIGNED_KMODS_PATH="$(params.dataDir)/$signedKmodsPath"
        SSH_OPTS=(
          -o UserKnownHostsFile=~/.ssh/known_hosts
          -o GSSAPIAuthentication=yes
          -o GSSAPIDelegateCredentials=yes
        )

        # Function to sign kernel modules for a specific architecture
        sign_kmods_for_arch() {
            local arch_name="$1"
            local task_uid
            task_uid="$(context.taskRun.uid)"

            signing_author="$signingAuthor"
            export signing_author
            export signKey
            echo "Executing SSH command to sign OOT kernel modules for architecture: $arch_name"
            # shellcheck disable=SC2029  # Intentional client-side expansion
            ssh "${SSH_OPTS[@]}" "${signUser}@${signHost}" \
            "export KEY='${signKey}'; export ARCH='${arch_name}'; \
             export TASK_UID='${task_uid}'; \
             export SIGNING_AUTHOR='${signing_author}'; \
             bash -s" <<'EOF'
        echo "Remote: Signing OOT kernel modules for architecture $ARCH using $KEY key..."

        # Construct the remote directory path using the remote server's HOME
        if [ "$ARCH" != "single" ]; then
            REMOTE_DIR="$HOME/$TASK_UID/kmods/$ARCH"
        else
            REMOTE_DIR="$HOME/$TASK_UID/kmods"
        fi

        # Check if any .ko files exist in the remote directory (recursively)
        if find "$REMOTE_DIR" -name "*.ko" -type f | head -1 | grep -q "."; then
            echo "Remote: Found .ko files in directory structure, signing recursively..."

            # Process each .ko file found recursively
            find "$REMOTE_DIR" -name "*.ko" -type f | while read -r kmod; do
                if [ -f "$kmod" ]; then
                    echo "Remote: Signing kernel module $kmod for $ARCH"
                    rh-signing-client --key "$KEY" --onbehalfof "${SIGNING_AUTHOR}" --lkmsign "$kmod"
                    if [ $? -ne 0 ]; then
                        echo "Remote: ERROR failed to sign $kmod for $ARCH"
                        exit 1
                    fi
                else
                    echo "Remote: Skipping entry $kmod (not a regular file)"
                fi
            done

            # Count and report signed files
            signed_count=$(find "$REMOTE_DIR" -name "*.ko" -type f | wc -l)
            echo "Remote: Successfully signed $signed_count .ko files for $ARCH"
        else
            echo "Remote: ERROR: No .ko files found in $REMOTE_DIR for $ARCH"
            exit 1
        fi

        echo "Remote: Finished signing process for architecture $ARCH"
        EOF
        }

        # Set up Kerberos and SSH
        KRB5CCNAME=FILE:/tmp/krb5cc_$(id -u)
        export KRB5CCNAME
        kinit -kt /etc/sec-keytab/keytab-build-and-sign.keytab "${signUser}@$(params.kerberosRealm)"

        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        cp /etc/sec-checksum/checksumFingerprint ~/.ssh/known_hosts
        chmod 600 ~/.ssh/known_hosts

        # Check if we have architecture-specific directories (multi-arch) or single-arch
        if [ -f "$(params.dataDir)/arch_count.txt" ]; then
            arch_count=$(cat "$(params.dataDir)/arch_count.txt")
            echo "Processing $arch_count architecture(s) for signing"

            if [ "$arch_count" -gt 1 ]; then
                echo "Multi-architecture signing process"

                # Create unique remote directory for this TaskRun to ensure isolation
                task_uid="$(context.taskRun.uid)"
                echo "Using unique remote directory: ~/$task_uid"
                # Intentional client-side expansion: task_uid expands locally for unique remote directories
                # shellcheck disable=SC2029
                ssh "${SSH_OPTS[@]}" "${signUser}@${signHost}" "mkdir -p ~/$task_uid"

                # Process each architecture directory
                for arch_dir in "$SIGNED_KMODS_PATH"/*/; do
                    if [ -d "$arch_dir" ]; then
                        arch_name=$(basename "$arch_dir")
                        echo "Processing signing for architecture: $arch_name"

                        # Backup envfile if present
                        if [ -f "$arch_dir/envfile" ]; then
                            cp "$arch_dir/envfile" "/tmp/envfile.backup.$arch_name"
                        fi

                        # Verify we have .ko files to sign (check recursively)
                        ko_files_found=false
                        if find "$arch_dir" -name "*.ko" -type f | head -1 | grep -q "."; then
                            ko_files_found=true
                            ko_count=$(find "$arch_dir" -name "*.ko" -type f | wc -l)
                            echo "Found $ko_count .ko files to sign for $arch_name (recursive search)"

                            # Show directory structure for verification
                            echo "Directory structure for $arch_name:"
                            find "$arch_dir" -name "*.ko" -type f | sort | head -10 | sed 's|^|  |'
                            if [ "$(find "$arch_dir" -name "*.ko" -type f | wc -l)" -gt 10 ]; then
                                echo "  ... (showing first 10 files)"
                            fi
                        else
                            echo "WARNING: No .ko files found for architecture $arch_name, skipping"
                            continue
                        fi

                        if [ "$ko_files_found" = true ]; then
                            # Create architecture-specific directory on signing server
                            # Intentional client-side expansion: task_uid expands locally for unique remote directories
                            # shellcheck disable=SC2029
                            ssh "${SSH_OPTS[@]}" "${signUser}@${signHost}" \
                                "mkdir -p ~/${task_uid}/kmods/${arch_name}"

                            # Copy unsigned kmods to signing server for this architecture (preserving structure)
                            echo "Copying directory structure with .ko files to signing server for $arch_name..."

                            # Create a temporary tarball with the directory structure
                            temp_tarball="/tmp/kmods_${arch_name}_${task_uid}.tar.gz"
                            cd "$arch_dir"

                            # Create tarball including all .ko files and their directory structure
                            find . -name "*.ko" -type f | tar -czf "$temp_tarball" --files-from=-

                            # Copy tarball to signing server
                            scp "${SSH_OPTS[@]}" "$temp_tarball" \
                                "${signUser}@${signHost}:~/${task_uid}/kmods_${arch_name}.tar.gz"

                            # Extract on remote server preserving structure
                            # Intentional client-side expansion: task_uid expands locally for unique remote directories
                            # shellcheck disable=SC2029
                            ssh "${SSH_OPTS[@]}" "${signUser}@${signHost}" \
                                "cd ~/${task_uid}/kmods/${arch_name} && tar -xzf ~/kmods_${arch_name}.tar.gz"

                            # Cleanup local temp file
                            rm -f "$temp_tarball"
                            cd - > /dev/null

                            # Verify files were copied to remote server
                            echo "Verifying files on remote server for $arch_name..."
                            # Intentional client-side expansion: task_uid expands locally for unique remote directories
                            # shellcheck disable=SC2029
                            ssh "${SSH_OPTS[@]}" "${signUser}@${signHost}" \
                                "ls -la ~/${task_uid}/kmods/${arch_name}/ || \
                                 echo 'WARNING: Directory not found on remote server'"

                            # Sign kmods for this architecture
                            sign_kmods_for_arch "$arch_name"

                            # Copy back signed kmods to workspace (preserving directory structure)
                            echo "Copying back signed .ko files with preserved structure for $arch_name..."

                            # Remove all .ko files first to ensure complete replacement
                            find "$arch_dir" -name "*.ko" -type f -delete

                            # Create tarball on remote server with signed files and copy back
                            signed_tarball="/tmp/signed_kmods_${arch_name}_${task_uid}.tar.gz"
                            # Intentional client-side expansion: task_uid expands locally for unique remote directories
                            # shellcheck disable=SC2029
                            ssh "${SSH_OPTS[@]}" "${signUser}@${signHost}" \
                                "cd ~/${task_uid}/kmods/${arch_name} && \
                                 find . -name '*.ko' -type f | \
                                 tar -czf ~/signed_${arch_name}.tar.gz --files-from=-"

                            # Copy back the tarball
                            scp "${SSH_OPTS[@]}" \
                                "${signUser}@${signHost}:~/${task_uid}/signed_${arch_name}.tar.gz" \
                                "$signed_tarball"

                            # Extract to workspace preserving directory structure
                            cd "$arch_dir"
                            tar -xzf "$signed_tarball"
                            cd - > /dev/null

                            # Cleanup temp file
                            rm -f "$signed_tarball"

                            # Verify extraction worked
                            signed_count=$(find "$arch_dir" -name "*.ko" -type f | wc -l)
                            if [ "$signed_count" -gt 0 ]; then
                                echo "Successfully copied back $signed_count signed .ko files for $arch_name"
                            else
                                echo "WARNING: No .ko files found after copy back for $arch_name"
                            fi

                            # Restore envfile
                            if [ -f "/tmp/envfile.backup.$arch_name" ]; then
                                cp "/tmp/envfile.backup.$arch_name" "$arch_dir/envfile"
                            fi

                            # Generate checksums for this architecture
                            echo "Generating checksums for $arch_name .ko files..."
                            cd "$arch_dir"
                            if ls ./*.ko >/dev/null 2>&1; then
                                sha256sum ./*.ko > "signed_kmods_checksums_${arch_name}.txt"
                                echo "Generated checksums for $arch_name:"
                                cat "signed_kmods_checksums_${arch_name}.txt"
                            fi
                            echo "Completed signing for $arch_name"
                        fi
                    fi
                done

                # Create overall signing summary
                echo "Multi-architecture signing summary:" > "$SIGNED_KMODS_PATH/signing_summary.txt"
                echo "Total architectures processed: $arch_count" >> "$SIGNED_KMODS_PATH/signing_summary.txt"
                echo "Signing details:" >> "$SIGNED_KMODS_PATH/signing_summary.txt"

                for arch_dir in "$SIGNED_KMODS_PATH"/*/; do
                    if [ -d "$arch_dir" ]; then
                        arch_name=$(basename "$arch_dir")
                        signed_count=0
                        if ls "$arch_dir"/*.ko 1> /dev/null 2>&1; then
                            signed_count=$(find "$arch_dir" -name "*.ko" -type f | wc -l)
                        fi
                        echo "  $arch_name: $signed_count signed .ko files" >> "$SIGNED_KMODS_PATH/signing_summary.txt"

                        # Verify signature by checking if files have been modified
                        if [ -f "$arch_dir/signed_kmods_checksums_${arch_name}.txt" ]; then
                            echo "    Checksums: verified" >> "$SIGNED_KMODS_PATH/signing_summary.txt"
                        fi
                    fi
                done

                echo "Multi-architecture signing completed. Summary:"
                cat "$SIGNED_KMODS_PATH/signing_summary.txt"

                # Clean up unique remote directory for supply chain integrity
                echo "Cleaning up remote directory ~/$task_uid"
                # Intentional client-side expansion: task_uid expands locally for unique remote directories
                # shellcheck disable=SC2029
                ssh "${SSH_OPTS[@]}" "${signUser}@${signHost}" "rm -rf ~/$task_uid"

            else
                echo "Single architecture, processing with subdirectory structure"

                # Find the architecture subdirectory (extract task always creates one)
                arch_subdir_name=""
                for potential_arch_dir in "$SIGNED_KMODS_PATH"/*/; do
                    if [ -d "$potential_arch_dir" ]; then
                        arch_subdir_name=$(basename "$potential_arch_dir")
                        echo "Found architecture subdirectory: $arch_subdir_name"
                        break
                    fi
                done

                if [ -z "$arch_subdir_name" ]; then
                    echo "ERROR: No architecture subdirectory found for single-arch build"
                    echo "Expected structure: $SIGNED_KMODS_PATH/<arch>/"
                    ls -la "$SIGNED_KMODS_PATH" || true
                    exit 1
                fi

                arch_dir="$SIGNED_KMODS_PATH/$arch_subdir_name"

                # Create unique remote directory for this TaskRun to ensure isolation
                task_uid="$(context.taskRun.uid)"
                echo "Using unique remote directory: ~/$task_uid"

                # Backup envfile if present
                if [ -f "$arch_dir/envfile" ]; then
                    cp "$arch_dir/envfile" "/tmp/envfile.backup.$arch_subdir_name"
                fi

                # Copy unsigned kmods to signing server (preserving structure)
                # Intentional client-side expansion: task_uid expands locally for unique remote directories
                # shellcheck disable=SC2029
                ssh "${SSH_OPTS[@]}" "${signUser}@${signHost}" "mkdir -p ~/${task_uid}/kmods"

                echo "Copying directory structure with .ko files from $arch_subdir_name to signing server..."

                # Create a temporary tarball with the directory structure
                temp_tarball="/tmp/kmods_single_${task_uid}.tar.gz"
                cd "$arch_dir"

                # Create tarball including all .ko files and their directory structure
                find . -name "*.ko" -type f | tar -czf "$temp_tarball" --files-from=-

                # Copy tarball to signing server
                scp "${SSH_OPTS[@]}" "$temp_tarball" \
                    "${signUser}@${signHost}:~/${task_uid}/kmods.tar.gz"

                # Extract on remote server
                # Intentional client-side expansion: task_uid expands locally for unique remote directories
                # shellcheck disable=SC2029
                ssh "${SSH_OPTS[@]}" "${signUser}@${signHost}" \
                    "cd ~/${task_uid}/kmods && tar -xzf ~/kmods.tar.gz"

                # Cleanup local temp file
                rm -f "$temp_tarball"
                cd - > /dev/null

                # Sign kmods
                sign_kmods_for_arch "single"

                # Copy back signed kmods to workspace (preserving directory structure)
                echo "Copying back signed .ko files with preserved structure for $arch_subdir_name..."

                # Remove all .ko files first to ensure complete replacement
                find "$arch_dir" -name "*.ko" -type f -delete

                # Create tarball on remote server with signed files and copy back
                signed_tarball="/tmp/signed_kmods_single_${task_uid}.tar.gz"
                # Intentional client-side expansion: task_uid expands locally for unique remote directories
                # shellcheck disable=SC2029
                ssh "${SSH_OPTS[@]}" "${signUser}@${signHost}" \
                    "cd ~/${task_uid}/kmods && \
                     find . -name '*.ko' -type f | \
                     tar -czf ~/signed_single.tar.gz --files-from=-"

                # Copy back the tarball
                scp "${SSH_OPTS[@]}" \
                    "${signUser}@${signHost}:~/${task_uid}/signed_single.tar.gz" \
                    "$signed_tarball"

                # Extract to workspace preserving directory structure
                cd "$arch_dir"
                tar -xzf "$signed_tarball"
                cd - > /dev/null

                # Cleanup temp file
                rm -f "$signed_tarball"

                # Verify extraction worked
                signed_count=$(find "$arch_dir" -name "*.ko" -type f | wc -l)
                if [ "$signed_count" -gt 0 ]; then
                    echo "Successfully copied back $signed_count signed .ko files for $arch_subdir_name"
                else
                    echo "ERROR: No .ko files found after signing process"
                    exit 1
                fi

                # Restore envfile
                if [ -f "/tmp/envfile.backup.$arch_subdir_name" ]; then
                    cp "/tmp/envfile.backup.$arch_subdir_name" "$arch_dir/envfile"
                fi

                # Generate checksums
                echo "Generating checksums for $arch_subdir_name .ko files..."
                cd "$arch_dir"
                if ls ./*.ko >/dev/null 2>&1; then
                    sha256sum ./*.ko > "signed_kmods_checksums_${arch_subdir_name}.txt"
                    echo "Generated checksums for $arch_subdir_name:"
                    cat "signed_kmods_checksums_${arch_subdir_name}.txt"
                else
                    echo "ERROR: No .ko files found after signing process"
                    exit 1
                fi

                # Clean up unique remote directory
                echo "Cleaning up remote directory ~/$task_uid"
                # Intentional client-side expansion: task_uid expands locally for unique remote directories
                # shellcheck disable=SC2029
                ssh "${SSH_OPTS[@]}" "${signUser}@${signHost}" "rm -rf ~/$task_uid"
            fi
        else
            echo "No architecture information found, falling back to single-arch logic"
            cd "$SIGNED_KMODS_PATH"

            # Create unique remote directory for this TaskRun to ensure isolation
            task_uid="$(context.taskRun.uid)"
            echo "Using unique remote directory: ~/$task_uid"

            # Backup envfile before signing process
            if [ -f "envfile" ]; then
                cp envfile /tmp/envfile.backup
            fi

            # Copy unsigned kmods to signing server (preserving structure if any)
            # Intentional client-side expansion: task_uid expands locally for unique remote directories
            # shellcheck disable=SC2029
            ssh "${SSH_OPTS[@]}" "${signUser}@${signHost}" "mkdir -p ~/${task_uid}/kmods"

            cd "$SIGNED_KMODS_PATH"
            # Check if we have any .ko files in subdirectories or just in root
            if find . -name "*.ko" -type f | head -1 | grep -q "."; then
                echo "Creating tarball with directory structure for fallback case..."
                # Create tarball including all .ko files and their directory structure
                temp_tarball="/tmp/kmods_fallback_${task_uid}.tar.gz"
                find . -name "*.ko" -type f | tar -czf "$temp_tarball" --files-from=-

                # Copy tarball to signing server
                scp "${SSH_OPTS[@]}" "$temp_tarball" \
                    "${signUser}@${signHost}:~/${task_uid}/kmods.tar.gz"

                # Extract on remote server
                # Intentional client-side expansion: task_uid expands locally for unique remote directories
                # shellcheck disable=SC2029
                ssh "${SSH_OPTS[@]}" "${signUser}@${signHost}" \
                    "cd ~/${task_uid}/kmods && tar -xzf ~/kmods.tar.gz"

                # Cleanup local temp file
                rm -f "$temp_tarball"
            fi
            cd - > /dev/null

            # Sign kmods
            sign_kmods_for_arch "single"

            # Copy back signed kmods to workspace (preserving structure)
            echo "Copying back signed .ko files for fallback case with preserved structure..."

            # Remove all .ko files first to ensure complete replacement
            find "${SIGNED_KMODS_PATH}" -name "*.ko" -type f -delete

            # Create tarball on remote server with signed files and copy back
            signed_tarball="/tmp/signed_kmods_fallback_${task_uid}.tar.gz"
            # Intentional client-side expansion: task_uid expands locally for unique remote directories
            # shellcheck disable=SC2029
            ssh "${SSH_OPTS[@]}" "${signUser}@${signHost}" \
                "cd ~/${task_uid}/kmods && \
                 find . -name '*.ko' -type f | \
                 tar -czf ~/signed_fallback.tar.gz --files-from=-"

            # Copy back the tarball
            if ssh "${SSH_OPTS[@]}" "${signUser}@${signHost}" "test -f ~/signed_fallback.tar.gz"; then
                scp "${SSH_OPTS[@]}" \
                    "${signUser}@${signHost}:~/${task_uid}/signed_fallback.tar.gz" \
                    "$signed_tarball"

                # Extract to workspace preserving directory structure
                cd "${SIGNED_KMODS_PATH}"
                tar -xzf "$signed_tarball"
                cd - > /dev/null

                # Cleanup temp file
                rm -f "$signed_tarball"

                # Verify extraction worked
                signed_count=$(find "${SIGNED_KMODS_PATH}" -name "*.ko" -type f | wc -l)
                if [ "$signed_count" -gt 0 ]; then
                    echo "Successfully copied back $signed_count signed .ko files for fallback case"
                else
                    echo "WARNING: No .ko files found after copy back for fallback case"
                fi
            else
                echo "WARNING: No signed files tarball found on remote server for fallback case"
            fi

            # Restore envfile after signing process
            if [ -f "/tmp/envfile.backup" ]; then
                cp /tmp/envfile.backup envfile
            fi

            # Generate checksums for signed .ko files
            echo "Generating checksums for signed .ko files..."
            if ls "${SIGNED_KMODS_PATH}"/*.ko >/dev/null 2>&1; then
                cd "${SIGNED_KMODS_PATH}"
                sha256sum ./*.ko > signed_kmods_checksums.txt
                echo "Generated checksums:"
                cat signed_kmods_checksums.txt
            else
                echo "ERROR: No .ko files found after signing process"
                exit 1
            fi

            # Clean up unique remote directory for supply chain integrity
            echo "Cleaning up remote directory ~/$task_uid"
            # Intentional client-side expansion: task_uid expands locally for unique remote directories
            # shellcheck disable=SC2029
            ssh "${SSH_OPTS[@]}" "${signUser}@${signHost}" "rm -rf ~/$task_uid"
        fi
    - name: create-trusted-artifact
      computeResources:
        limits:
          memory: 128Mi
        requests:
          memory: 128Mi
          cpu: 250m
      ref:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: stepactions/create-trusted-artifact/create-trusted-artifact.yaml
      params:
        - name: ociStorage
          value: $(params.ociStorage)
        - name: workDir
          value: $(params.dataDir)
        - name: sourceDataArtifact
          value: $(results.sourceDataArtifact.path)
