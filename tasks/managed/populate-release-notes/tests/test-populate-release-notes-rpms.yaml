---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-populate-release-notes-rpms
spec:
  description: |
    Run the populate-release-notes task and ensure RPM releases
    generate PURLs with versions instead of placeholders.
  params:
    - name: ociStorage
      description: The OCI repository where the Trusted Artifacts are stored.
      type: string
    - name: ociArtifactExpiresAfter
      description: Expiration date for the trusted artifacts created in the
        OCI repository. An empty string means the artifacts do not expire.
      type: string
      default: "1d"
    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls
      type: string
      default: "--insecure"
    - name: trustedArtifactsDebug
      description: Flag to enable debug logging in trusted artifacts. Set to a non-empty string to enable.
      type: string
      default: ""
    - name: dataDir
      description: The location where data will be stored
      type: string
  tasks:
    - name: setup
      taskSpec:
        results:
          - name: sourceDataArtifact
            type: string
        volumes:
          - name: workdir
            emptyDir: {}
        stepTemplate:
          volumeMounts:
            - mountPath: /var/workdir
              name: workdir
          env:
            - name: IMAGE_EXPIRES_AFTER
              value: $(params.ociArtifactExpiresAfter)
            - name: "ORAS_OPTIONS"
              value: "$(params.orasOptions)"
            - name: "DEBUG"
              value: "$(params.trustedArtifactsDebug)"
        steps:
          - name: setup
            image: quay.io/konflux-ci/release-service-utils@sha256:f10b4ad888634a7633f76ede29003ce1471aec2b76a7d9e01ad282a3011eb78f
            script: |
              #!/usr/bin/env sh
              set -eux

              mkdir -p "$(params.dataDir)/$(context.pipelineRun.uid)"
              cat > "$(params.dataDir)/$(context.pipelineRun.uid)/data.json" << EOF
              {
                "mapping": {
                  "components": [
                      {
                        "name": "hello--main",
                        "contentType": "rpm"
                      }
                    ]
                },
                "releaseNotes": {
                  "product_id": [
                    932
                  ],
                  "product_name": "Hummingbird",
                  "product_version": "1.0",
                  "cpe": "cpe:/a:hummingbird:hummingbird:1.0",
                  "type": "RHSA",
                  "synopsis": "Hummingbird 1.0 release",
                  "topic": "test topic",
                  "description": "Hummingbird 1.0 release",
                  "solution": "Hummingbird 1.0 release",
                  "references": [
                    "https://github.com/hummingbird-project/hummingbird/releases/tag/v1.0"
                  ]
                }
              }
              EOF

              mkdir -p "$(params.dataDir)/$(context.pipelineRun.uid)"
              cat > "$(params.dataDir)/$(context.pipelineRun.uid)/snapshot_spec.json" << EOF
              {
                "application": "hummingbird",
                "artifacts": {},
                "components": [
                  {
                    "containerImage": "quay.io/hummingbird/hello--main@sha256:12345",
                    "name": "hello--main",
                    "source": {
                      "git": {
                        "revision": "32c8f78c26e5831a87aa865ea80452fadbb3a95e",
                        "url": "https://github.com/hummingbird-project/hello.git"
                      }
                    },
                    "rpmsToPublish": [
                      {
                        "rpm": "hello-1.0-1.fc38.x86_64.rpm",
                        "rpmname": "hello",
                        "arch": "x86_64",
                        "epoch": "0",
                        "version": "1.0",
                        "release": "1.fc38",
                        "sha256": "1234567890",
                        "targetRepos": ["hbird-x86_64"]
                      },
                      {
                        "rpm": "hello-1.0-1.fc38.src.rpm",
                        "rpmname": "hello",
                        "arch": "src",
                        "epoch": "0",
                        "version": "1.0",
                        "release": "1.fc38",
                        "sha256": "0987654321",
                        "targetRepos": ["hbird-source"]
                      }
                    ]
                  }
                ]
              }
              EOF
          - name: create-trusted-artifact
            ref:
              name: create-trusted-artifact
            params:
              - name: ociStorage
                value: $(params.ociStorage)
              - name: workDir
                value: $(params.dataDir)
              - name: sourceDataArtifact
                value: $(results.sourceDataArtifact.path)
    - name: run-task
      taskRef:
        name: populate-release-notes
      params:
        - name: dataPath
          value: "$(context.pipelineRun.uid)/data.json"
        - name: snapshotPath
          value: "$(context.pipelineRun.uid)/snapshot_spec.json"
        - name: ociStorage
          value: $(params.ociStorage)
        - name: orasOptions
          value: $(params.orasOptions)
        - name: sourceDataArtifact
          value: "$(tasks.setup.results.sourceDataArtifact)=$(params.dataDir)"
        - name: dataDir
          value: $(params.dataDir)
        - name: trustedArtifactsDebug
          value: $(params.trustedArtifactsDebug)
        - name: taskGitUrl
          value: "http://localhost"
        - name: taskGitRevision
          value: "main"
      runAfter:
        - setup
    - name: check-result
      params:
        - name: sourceDataArtifact
          value: "$(tasks.run-task.results.sourceDataArtifact)=$(params.dataDir)"
        - name: dataDir
          value: $(params.dataDir)
      runAfter:
        - run-task
      taskSpec:
        params:
          - name: sourceDataArtifact
            type: string
          - name: dataDir
            type: string
        volumes:
          - name: workdir
            emptyDir: {}
        stepTemplate:
          volumeMounts:
            - mountPath: /var/workdir
              name: workdir
          env:
            - name: IMAGE_EXPIRES_AFTER
              value: $(params.ociArtifactExpiresAfter)
            - name: "ORAS_OPTIONS"
              value: "$(params.orasOptions)"
            - name: "DEBUG"
              value: "$(params.trustedArtifactsDebug)"
        steps:
          - name: use-trusted-artifact
            ref:
              name: use-trusted-artifact
            params:
              - name: workDir
                value: $(params.dataDir)
              - name: sourceDataArtifact
                value: $(params.sourceDataArtifact)
          - name: check-result
            image: quay.io/konflux-ci/release-service-utils@sha256:f10b4ad888634a7633f76ede29003ce1471aec2b76a7d9e01ad282a3011eb78f
            workingDir: $(params.dataDir)
            script: |
              #!/usr/bin/env bash
              set -eux

              DATA_FILE="$(params.dataDir)/$(context.pipelineRun.uid)/data.json"
              cat "$DATA_FILE"

              # Check that artifacts were populated for marketplace disk image
              ARTIFACTS_COUNT=$(jq '.releaseNotes.content.artifacts | length' "$DATA_FILE")
              if [ "$ARTIFACTS_COUNT" -ne 2 ]; then
                echo "Expected 2 artifacts, got $ARTIFACTS_COUNT"
                exit 1
              fi

              # Verify that the PURL is correct for the first artifact
              PURL=$(jq -r '.releaseNotes.content.artifacts[0].purl' "$DATA_FILE")
              EXPECTED_PURL="pkg:rpm/redhat/hello@1.0-1.fc38?arch=x86_64&checksum=sha256:1234567890&repository_id=hbird-x86_64"

              if [ "$PURL" != "$EXPECTED_PURL" ]; then
                echo "Error: Expected PURL '$EXPECTED_PURL', got '$PURL'"
                exit 1
              fi

              # Verify architecture is "x86_64"
              ARCH=$(jq -r '.releaseNotes.content.artifacts[0].architecture' "$DATA_FILE")
              if [ "$ARCH" != "x86_64" ]; then
                echo "Error: Expected architecture 'x86_64', got '$ARCH'"
                exit 1
              fi

              # Verify OS is "linux"
              OS=$(jq -r '.releaseNotes.content.artifacts[0].os' "$DATA_FILE")
              if [ "$OS" != "linux" ]; then
                echo "Error: Expected OS 'linux', got '$OS'"
                exit 1
              fi

              # Verify component name is "hello--main"
              COMPONENT=$(jq -r '.releaseNotes.content.artifacts[0].component' "$DATA_FILE")
              if [ "$COMPONENT" != "hello--main" ]; then
                echo "Error: Expected component 'hello--main', got '$COMPONENT'"
                exit 1
              fi
