---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: push-rpms-to-pulp
spec:
  description: |
    A task to push rpm packages from an OCI artifact to a Pulp repository.
  params:
    - name: SNAPSHOT_PATH
      type: string
      description: Path to the snapshot spec file containing image information
    - name: PULP_DOMAIN
      type: string
      description: The domain to use for Pulp operations
    - name: PULP_SECRET_NAME
      type: string
      description: >-
        The name of the secret containing the Pulp cli.toml file. It must have the cli.toml key
    - name: DEFAULT_EXCLUDES
      type: string
      description: comma-delimited list of file patterns to exclude from the upload
      default: "-debuginfo-, -debugsource-"
    - name: DEFAULT_ARCHITECTURES
      type: string
      description: >-
        Comma-delimited list of default architectures to use for noarch RPMs when
        no arch-specific RPMs are found
      default: "x86_64,aarch64,s390x,ppc64le"
    - name: resultsDirPath
      description: Path to the results directory in the data workspace
      type: string
    - name: ociStorage
      description: The OCI repository where the Trusted Artifacts are stored
      type: string
      default: "empty"
    - name: ociArtifactExpiresAfter
      description: Expiration date for the trusted artifacts created in the
        OCI repository. An empty string means the artifacts do not expire
      type: string
      default: "1d"
    - name: trustedArtifactsDebug
      description: Flag to enable debug logging in trusted artifacts. Set to a non-empty string to enable
      type: string
      default: ""
    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls
      type: string
      default: ""
    - name: sourceDataArtifact
      type: string
      description: Location of trusted artifacts to be used to populate data directory
      default: ""
    - name: dataDir
      description: The location where data will be stored
      type: string
      default: /var/workdir/release
    - name: taskGitUrl
      type: string
      description: The url to the git repo where the release-service-catalog tasks and stepactions to be used are stored
    - name: taskGitRevision
      type: string
      description: The revision in the taskGitUrl repo to be used
    - name: caTrustConfigMapName
      type: string
      description: The name of the ConfigMap to read CA bundle data from
      default: trusted-ca
    - name: caTrustConfigMapKey
      type: string
      description: The name of the key in the ConfigMap that contains the CA bundle data
      default: ca-bundle.crt
  results:
    - description: Produced trusted data artifact
      name: sourceDataArtifact
      type: string
  volumes:
    - name: workdir
      emptyDir: {}
    - name: pulp-secret-name-vol
      secret:
        secretName: $(params.PULP_SECRET_NAME)
        defaultMode: 0444
    - name: trusted-ca
      configMap:
        name: $(params.caTrustConfigMapName)
        items:
          - key: $(params.caTrustConfigMapKey)
            path: ca-bundle.crt
        optional: true

  stepTemplate:
    env:
      # Ensure Tekton creds-init can copy registry creds to a writable $HOME (avoid /tekton/home permission warnings).
      - name: HOME
        value: /tmp
      - name: SNAPSHOT_PATH
        value: $(params.dataDir)/$(params.SNAPSHOT_PATH)
      - name: DEFAULT_EXCLUDES
        value: $(params.DEFAULT_EXCLUDES)
      - name: DEFAULT_ARCHITECTURES
        value: $(params.DEFAULT_ARCHITECTURES)
      - name: DATA_DIR
        value: $(params.dataDir)
      - name: PULP_DOMAIN
        value: $(params.PULP_DOMAIN)
      - name: PULP_SECRET_NAME
        value: $(params.PULP_SECRET_NAME)
      - name: RESULTS_DIR_PATH
        value: $(params.resultsDirPath)
      - name: ociStorage
        value: $(params.ociStorage)
      - name: ociArtifactExpiresAfter
        value: $(params.ociArtifactExpiresAfter)
      - name: trustedArtifactsDebug
        value: $(params.trustedArtifactsDebug)
      - name: IMAGES_TXT
        value: $(params.dataDir)/images.txt
      - name: FILES_DIR
        value: $(params.dataDir)/files
      - name: IMAGE_EXPIRES_AFTER
        value: $(params.ociArtifactExpiresAfter)
      - name: ORAS_OPTIONS
        value: $(params.orasOptions)
      - name: DEBUG
        value: $(params.trustedArtifactsDebug)
    volumeMounts:
      - name: workdir
        mountPath: "/var/workdir"
      - name: trusted-ca
        mountPath: /mnt/trusted-ca
        readOnly: true
    workingDir: "/var/workdir"
    securityContext:
      runAsUser: 1001
  steps:
    - name: use-trusted-artifact
      computeResources:
        limits:
          memory: 64Mi
          cpu: 30m
        requests:
          memory: 64Mi
          cpu: 30m
      ref:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: stepactions/use-trusted-artifact/use-trusted-artifact.yaml
      params:
        - name: workDir
          value: $(params.dataDir)
        - name: sourceDataArtifact
          value: $(params.sourceDataArtifact)
    - name: push-rpms-to-pulp
      image: quay.io/konflux-ci/release-service-utils@sha256:5546fa78d3c88d7b6a2e8cff8902f7757f00541d0bbaf113b9f293133894afa3
      computeResources:
        limits:
          memory: 256Mi
          cpu: 250m
        requests:
          memory: 256Mi
          cpu: 250m
      volumeMounts:
        - name: pulp-secret-name-vol
          mountPath: "/etc/secrets"
      script: |
        #!/bin/bash
        set -euo pipefail

        CONFIG_FILE_CONTENT="$(cat /etc/secrets/cli.toml)"

        set +x
        echo "${CONFIG_FILE_CONTENT:?}" > "/tmp/cli.toml"
        export PULP_CONFIG_FILE="/tmp/cli.toml"

        # Helpers to read cli.toml values (return empty string when not found)
        toml_get_optional() {
          local key="$1"
          if [[ ! "${key}" =~ ^[A-Za-z0-9_]+$ ]]; then
            echo "Error: Invalid cli.toml key '${key}'" >&2
            return 1
          fi

          # Simple quoted-string extractor.
          # Accepts:
          # - top-level: key = "value"  (before any [table] header)
          # - [cli] table: [cli] ... key = "value"
          # Handles leading whitespace and ignores blank/comment lines.
          local line current_table=""
          while IFS= read -r line || [[ -n "${line}" ]]; do
            # Table header: [cli]
            if [[ "${line}" =~ ^[[:space:]]*\\[([^]]+)\\][[:space:]]*$ ]]; then
              current_table="${BASH_REMATCH[1]}"
              continue
            fi

            # Skip comments/blank lines
            if [[ "${line}" =~ ^[[:space:]]*# ]] || [[ "${line}" =~ ^[[:space:]]*$ ]]; then
              continue
            fi

            # Only parse top-level or [cli]
            if [[ -n "${current_table}" && "${current_table}" != "cli" ]]; then
              continue
            fi

            if [[ "${line}" =~ ^[[:space:]]*${key}[[:space:]]*= ]]; then
              # Extract the first quoted string value. (Bash regex does not interpret \r/\n escapes here.)
              if [[ "${line}" =~ \"([^\"]*)\" ]]; then
                echo "${BASH_REMATCH[1]}"
                return 0
              fi
              if [[ "${line}" =~ \'([^\']*)\' ]]; then
                echo "${BASH_REMATCH[1]}"
                return 0
              fi
              echo ""
              return 0
            fi
          done < "${PULP_CONFIG_FILE}"

          echo ""
          return 0
        }

        toml_get_required() {
          local key="$1"
          local value
          value="$(toml_get_optional "${key}")"
          if [[ -z "${value}" ]]; then
            echo "Error: Missing required '${key}' in cli.toml" >&2
            return 1
          fi
          echo "${value}"
        }

        # Extract credentials from cli.toml
        PULP_BASE_URL="$(toml_get_required "base_url" | sed 's:/*$::')" || exit 1
        CLIENT_ID="$(toml_get_optional "client_id")"
        CLIENT_SECRET="$(toml_get_optional "client_secret")"
        PULP_USERNAME="$(toml_get_optional "username")"
        PULP_PASSWORD="$(toml_get_optional "password")"
        TOKEN_URL="https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token"

        # Detect auth method (do not log secrets)
        AUTH_METHOD="unknown"
        if [[ -n "${PULP_USERNAME}" && -n "${PULP_PASSWORD}" ]]; then
          AUTH_METHOD="basic"
        elif [[ -n "${CLIENT_ID}" && -n "${CLIENT_SECRET}" ]]; then
          AUTH_METHOD="oauth2-bearer"
        fi
        echo "Auth method detected for Pulp API calls: ${AUTH_METHOD}"

        # Function to get OAuth2 access token

        get_access_token() {
          if [[ -z "${CLIENT_ID}" || -z "${CLIENT_SECRET}" ]]; then
            echo "Error: client_id/client_secret not present in cli.toml; cannot use OAuth2 Bearer token flow" >&2
            return 1
          fi
          local token
          token=$(curl --retry 3 -s -X POST "$TOKEN_URL" \
            -u "${CLIENT_ID}:${CLIENT_SECRET}" \
            -d "grant_type=client_credentials" \
            -d "scope=api.console" | jq -r '.access_token')

          if [[ -z "$token" || "$token" == "null" ]]; then
            echo "Error: Failed to get OAuth2 access token" >&2
            return 1
          fi
          echo "$token"
        }

        # Get Authorization header for curl based on available credentials.
        # Uses AUTH_METHOD computed above (basic preferred when username/password present).
        get_auth_header() {
          case "${AUTH_METHOD}" in
            basic)
              local basic
              basic="$(printf '%s' "${PULP_USERNAME}:${PULP_PASSWORD}" | base64 -w0)"
              echo "Authorization: Basic ${basic}"
              return 0
              ;;
            oauth2-bearer)
              local access_token
              access_token="$(get_access_token)" || return 1
              echo "Authorization: Bearer ${access_token}"
              return 0
              ;;
            *)
              echo "Error: No supported credentials found in cli.toml." >&2
              echo "Provide either username/password or client_id/client_secret." >&2
              return 1
              ;;
          esac
        }

        # Function to add content to a repository via API
        add_content_to_repo() {
          local repo_name="$1"
          local hrefs_json="$2"
          local domain="${PULP_DOMAIN}"

          # Disable command echoing for sensitive operations
          set +x
          local auth_header
          auth_header="$(get_auth_header)" || return 1

          # Get repository href
          local repo_href
          repo_href=$(
            set +x
            curl --retry 3 -s -H "${auth_header}" \
              "${PULP_BASE_URL}/api/pulp/${domain}/api/v3/repositories/rpm/rpm/?name=${repo_name}" \
              | jq -r '.results[0].pulp_href'
          )
          set -x

          if [[ -z "$repo_href" || "$repo_href" == "null" ]]; then
            echo "Error: Could not find repository href for ${repo_name}"
            return 1
          fi

          # Convert hrefs format: [{"pulp_href": "..."}] -> ["..."]
          local add_content_units
          add_content_units=$(echo "$hrefs_json" | jq '[.[].pulp_href]')

          # Add content to repository
          echo "Calling API: POST ${PULP_BASE_URL}${repo_href}modify/"
          {
            set +x
            curl --retry 3 -s -X POST "${PULP_BASE_URL}${repo_href}modify/" \
              -H "${auth_header}" \
              -H "Content-Type: application/json" \
              -d "{\"add_content_units\": $add_content_units}"
            set -x
          }
        }

        # Function to upload an RPM to Pulp with retries
        pulp_upload_with_retry() {
          local file_path="$1"
          local attempts=5
          local delay_seconds=2
          local response=""
          local rc=1
          local href=""
          local relpath
          relpath="$(basename "${file_path}")"
          # Build a printable command string for logging (no secrets included)
          local printable_cmd
          printable_cmd="pulp --config \"${PULP_CONFIG_FILE}\" --domain \"${PULP_DOMAIN}\" rpm content upload"
          printable_cmd+=" --chunk-size 20MB --file \"${file_path}\" --relative-path \"${relpath}\""

          for ((i=1; i<=attempts; i++)); do
            # For retries (i > 1) make it explicit which command is being retried
            if (( i > 1 )); then
              echo "Retrying command (attempt ${i}/${attempts}):" >&2
              echo "  ${printable_cmd}" >&2
            fi
            set +e
            response=$(pulp --config "$PULP_CONFIG_FILE" --domain "${PULP_DOMAIN}" rpm content upload \
              --chunk-size 20MB --file "${file_path}" --relative-path "${relpath}")
            rc=$?
            set -e

            # Consider success only when command succeeds and pulp_href is present
            href=$(jq -r '.pulp_href // empty' <<< "$response")
            if [[ $rc -eq 0 && -n "$href" ]]; then
              echo "$response"
              return 0
            fi

            echo "Upload attempt ${i}/${attempts} failed for ${file_path} (rc=${rc}, href='${href:-}')." >&2
            echo "Command: ${printable_cmd}" >&2
            if (( i < attempts )); then
              sleep "${delay_seconds}"
              # Exponential backoff
              delay_seconds=$((delay_seconds * 2))
            fi
          done

          # Return the last response for diagnostics on failure
          echo "$response"
          return 1
        }

        # Parse NEVRA fields from an RPM file.
        #
        # Prefer querying the RPM header (robust for names containing multiple dashes).
        # Fall back to filename parsing only when the RPM header cannot be read (e.g. empty mock files in tests).
        parse_nevra() {
          local file_path="$1"
          local name epoch version release arch

          local q rc
          set +e
          q="$(rpm -qp --qf '%{NAME}|%{EPOCH}|%{VERSION}|%{RELEASE}|%{ARCH}\n' \
            "${file_path}" 2>/dev/null)"
          rc=$?
          set -e

          if [[ ${rc} -eq 0 && -n "${q}" ]]; then
            IFS='|' read -r name epoch version release arch <<< "${q}"
            if [[ -z "${epoch}" || "${epoch}" == "(none)" ]]; then
              epoch="0"
            fi
            if [[ -n "${name}" && -n "${version}" && -n "${release}" && -n "${arch}" ]]; then
              echo "${name}|${epoch}|${version}|${release}|${arch}"
              return 0
            fi
          fi

          # Fallback: infer from filename (name-version-release.arch.rpm). This may be wrong for some edge cases.
          local filename base nvra namever version_with_epoch
          filename="$(basename "${file_path}")"
          base="${filename%.rpm}"
          arch="${base##*.}"
          nvra="${base%.*}"
          release="${nvra##*-}"
          namever="${nvra%-*}"
          version_with_epoch="${namever##*-}"
          name="${namever%-*}"

          if [[ -z "${name}" || -z "${version_with_epoch}" || -z "${release}" || -z "${arch}" ]]; then
            echo "Error: Failed to parse NEVRA from '${filename}'" >&2
            return 1
          fi

          epoch="0"
          if [[ "${version_with_epoch}" == *:* ]]; then
            epoch="${version_with_epoch%%:*}"
            version="${version_with_epoch#*:}"
          else
            version="${version_with_epoch}"
          fi

          if [[ -z "${version}" ]]; then
            echo "Error: Failed to parse NEVRA version from '${filename}'" >&2
            return 1
          fi

          echo "${name}|${epoch}|${version}|${release}|${arch}"
        }

        # Resolve repository latest version href
        get_repo_latest_version_href() {
          local repo_name="$1"
          local auth_header repo_href
          set +x
          auth_header="$(get_auth_header)" || return 1
          set -x
          repo_href=$(
            set +x
            curl --retry 3 -s \
              -H "${auth_header}" \
              "${PULP_BASE_URL}/api/pulp/${PULP_DOMAIN}/api/v3/repositories/rpm/rpm/?name=${repo_name}" \
              | jq -r '.results[0].pulp_href'
          )
          if [[ -z "$repo_href" || "$repo_href" == "null" ]]; then
            echo "Error: Could not find repository href for ${repo_name}"
            return 1
          fi
          {
            set +x
            curl --retry 3 -s -H "${auth_header}" \
              "${PULP_BASE_URL}${repo_href}" | jq -r '.latest_version_href'
            set -x
          }
        }

        # Check if rpm exists in repo and compare digest with local file
        # Returns:
        #   0 -> exists and digest matches
        #   2 -> does not exist
        #   3 -> exists but digest differs
        check_rpm_exists_with_digest() {
          local repo_name="$1"
          local file_path="$2"

          local nevra name epoch version release arch endpoint
          if ! nevra="$(parse_nevra "${file_path}")"; then
            echo "Error: Failed to parse NEVRA for '${file_path}'" >&2
            return 1
          fi
          IFS='|' read -r name epoch version release arch <<< "${nevra}"
          if [[ -z "${name}" || -z "${epoch}" || -z "${version}" || -z "${release}" ]]; then
            echo "Error: Parsed NEVRA is incomplete for '${file_path}': '${nevra}'" >&2
            return 1
          fi

          # Pulp's RPM content API supports querying SRPMs via the "packages" endpoint with arch=src.
          # Some deployments do not expose a separate "srpms" endpoint (404).
          endpoint="packages"
          if [[ "${file_path}" == *.src.rpm ]]; then
            # Some SRPMs report a non-src arch in the header; the Pulp API uses arch=src for SRPM queries.
            arch="src"
          fi

          # Compute local sha256
          local local_sha
          local_sha="$(sha256sum "${file_path}" | awk '{print $1}')"

          # Resolve latest repository version href
          local repo_version_href
          repo_version_href="$(get_repo_latest_version_href "${repo_name}")" || return 1

          # Build query URL using NEVRA
          local enc_repo_version enc_name enc_epoch enc_version enc_release enc_arch query_url
          enc_repo_version="$(jq -rn --arg x "${repo_version_href}" '$x|@uri')"
          enc_name="$(jq -rn --arg x "${name}" '$x|@uri')"
          enc_epoch="$(jq -rn --arg x "${epoch}" '$x|@uri')"
          enc_version="$(jq -rn --arg x "${version}" '$x|@uri')"
          enc_release="$(jq -rn --arg x "${release}" '$x|@uri')"
          if [[ "${endpoint}" == "packages" ]]; then
            enc_arch="$(jq -rn --arg x "${arch}" '$x|@uri')"
          else
            enc_arch=""
          fi
          query_url="${PULP_BASE_URL}/api/pulp/${PULP_DOMAIN}/api/v3/content/rpm/${endpoint}/"
          query_url+="?repository_version=${enc_repo_version}"
          query_url+="&name=${enc_name}&epoch=${enc_epoch}"
          query_url+="&version=${enc_version}&release=${enc_release}"
          if [[ -n "${enc_arch}" ]]; then
            query_url+="&arch=${enc_arch}"
          fi

          # Perform query
          local auth_header response count
          {
            set +x
            auth_header="$(get_auth_header)" || return 1
            response="$(curl --retry 3 -s -H "${auth_header}" \
              "${query_url}")"
            set -x
          }
          count="$(jq -r '.count // 0' <<< "${response}")"
          if [[ "${count}" -eq 0 ]]; then
            return 2
          fi

          # Compare digest with artifacts of matched content units
          local content_hrefs server_sha artifact_href content_json artifact_json
          mapfile -t content_hrefs < <(jq -r '.results[].pulp_href' <<< "${response}" \
            | sed '/^null$/d')
          for chref in "${content_hrefs[@]}"; do
            content_json="$(
              set +x
              curl --retry 3 -s -H "${auth_header}" \
                "${PULP_BASE_URL}${chref}"
            )"
            artifact_href="$(jq -r '.artifact // empty' <<< "${content_json}")"
            if [[ -z "${artifact_href}" || "${artifact_href}" == "null" ]]; then
              artifact_href="$(jq -r '.artifacts[0] // empty' <<< "${content_json}")"
            fi
            if [[ -z "${artifact_href}" || "${artifact_href}" == "null" ]]; then
              continue
            fi
            artifact_json="$(
              set +x
              curl --retry 3 -s -H "${auth_header}" \
                "${PULP_BASE_URL}${artifact_href}"
            )"
            server_sha="$(jq -r '.sha256 // empty' <<< "${artifact_json}")"
            if [[ -n "${server_sha}" && "${server_sha}" == "${local_sha}" ]]; then
              return 0
            fi
          done
          return 3
        }

        set -x

        DOMAIN_EXISTS=$(pulp --config "$PULP_CONFIG_FILE" domain show --name "${PULP_DOMAIN}" \
          | jq -r ".name // \"\"" || echo "")
        if [[ "$DOMAIN_EXISTS" == "$PULP_DOMAIN" ]]; then
            echo "Domain '${PULP_DOMAIN}' exists"
        else
            echo "Domain '${PULP_DOMAIN}' not found."
            exit 1
        fi

        RESULTS_FILE="${DATA_DIR}/${RESULTS_DIR_PATH}/push-rpms-to-pulp-results.json"
        mkdir -p "$(dirname "${RESULTS_FILE}")"

        # Initialize results file with empty rpmfiles array
        echo '{"rpmfiles": []}' > "$RESULTS_FILE"

        # jq filter used to append RPM metadata entries to the results file.
        # Keep this as a multi-line bash string (not a heredoc) so it stays valid YAML inside script: |
        # shellcheck disable=SC2016
        JQ_APPEND_RPMFILE='
        .rpmfiles += [{
          rpm: $pkg,
          rpmname: $rpmname,
          arch: $arch,
          pulprepo: $pulprepo,
          epoch: $epoch,
          version: $version,
          release: $release,
          sha256: $sha256
        }]
        '

        # If the snapshot was pre-processed by filter-already-released-advisory-rpms, it will include
        # `.components[].rpmsToPublish[]` entries that specify exactly which RPMs should
        # be published to which repos. When present, we only attempt uploads for those.
        RPM_REPO_MAP="$(
          jq -c '
            [ .components[].rpmsToPublish[]? | {rpm, targetRepos} ]
            | reduce .[] as $i ({}; .[$i.rpm] =
                ((.[$i.rpm] // []) + ($i.targetRepos // []) | unique)
              )
          ' "${SNAPSHOT_PATH}" 2>/dev/null || echo "{}"
        )"
        RPM_FILTER_ENABLED="false"
        if [[ "${RPM_REPO_MAP}" != "{}" ]]; then
          RPM_FILTER_ENABLED="true"
        fi
        echo "RPM pre-filter detected in snapshot: ${RPM_FILTER_ENABLED}"

        jq -r '.components[].containerImage' "${SNAPSHOT_PATH}" | tee "${IMAGES_TXT}"

        AUTHFILE='/tmp/auth.json'
        mkdir -p "${FILES_DIR}"
        while read -r IMAGE; do
          echo "Processing ${IMAGE}"
          select-oci-auth "${IMAGE}" > "${AUTHFILE}"
          oras pull --registry-config "${AUTHFILE}" "${IMAGE}" -o "${FILES_DIR}"
        done < "${IMAGES_TXT}"

        cd "${FILES_DIR}"

        # Create filtered list of files to upload
        FILES_TO_UPLOAD=()

        # Convert comma-delimited exclude patterns to array
        IFS=',' read -ra EXCLUDE_PATTERNS <<< "${DEFAULT_EXCLUDES}"

        # Get all files and filter out excluded patterns
        for file in *; do
          if [ -f "$file" ]; then
            # Only process .rpm files
            if [[ "$file" != *.rpm ]]; then
              echo "Skipping $file (not an RPM file)"
              continue
            fi

            should_exclude=false

            # Check if file matches any exclude pattern
            for pattern in "${EXCLUDE_PATTERNS[@]}"; do
              # Remove leading/trailing whitespace from pattern
              pattern=$(echo "$pattern" | xargs)
              if [[ "$file" == *"$pattern"* ]]; then
                echo "Excluding $file (matches pattern: $pattern)"
                should_exclude=true
                break
              fi
            done

            # Add to upload list if not excluded
            if [ "$should_exclude" = false ]; then
              FILES_TO_UPLOAD+=("$file")
              echo "Including $file for upload"
            fi
          fi
        done

        # Extract architectures from RPM filenames
        ARCHES=()
        for file in "${FILES_TO_UPLOAD[@]}"; do
          # Skip .src.rpm and .noarch.rpm files
          if [[ "$file" == *.src.rpm ]] || [[ "$file" == *.noarch.rpm ]]; then
            continue
          fi

          # Extract architecture from filename (e.g., package-1.0-1.x86_64.rpm -> x86_64)
          if [[ "$file" =~ \.([^.]+)\.rpm$ ]]; then
            arch="${BASH_REMATCH[1]}"

            # Add to ARCHES array if not already present
            if [[ ! " ${ARCHES[*]} " == *" ${arch} "* ]]; then
              ARCHES+=("$arch")
              echo "Found architecture: $arch"
            fi
          fi
        done

        echo "Detected architectures: ${ARCHES[*]}"

        # Check if we have any noarch RPMs that need to be uploaded
        noarch_rpms=()
        for file in "${FILES_TO_UPLOAD[@]}"; do
          if [[ "$file" == *.noarch.rpm ]]; then
            noarch_rpms+=("$file")
          fi
        done

        # If we have noarch RPMs but no architectures, use default architectures from parameter
        if [ ${#noarch_rpms[@]} -gt 0 ] && [ ${#ARCHES[@]} -eq 0 ]; then
          echo "⚠️  Found noarch RPMs but no architecture-specific RPMs."
          echo "   Using default architectures from parameter: ${DEFAULT_ARCHITECTURES}"
          echo "   Available noarch RPMs: ${noarch_rpms[*]}"

          # Parse comma-delimited default architectures into array
          IFS=',' read -ra DEFAULT_ARCHES <<< "${DEFAULT_ARCHITECTURES}"
          for i in "${!DEFAULT_ARCHES[@]}"; do
            DEFAULT_ARCHES[i]=$(echo "${DEFAULT_ARCHES[i]}" | xargs)
          done
          ARCHES=("${DEFAULT_ARCHES[@]}")
        fi

        # Map to the specific arch: *.x86_64.rpm -> x86_64 repo
        # Map noarch rpm: *.noarch.rpm -> every arch repo
        # Map source rpms: *.src.rpm -> source rpm repo

        # Upload files organized by architecture
        for arch in "${ARCHES[@]}"; do
          echo "Processing architecture: $arch"

          REPO_EXISTS=$(pulp  --config "$PULP_CONFIG_FILE" --domain "${PULP_DOMAIN}" \
            rpm repository list --field name | jq -r ".[] | \
            select(.name == \"${arch}\") | .name")

          if [[ "$REPO_EXISTS" == "${arch}" ]]; then
              echo "Repository '${arch}' exists"
          else
              echo "Repository '${arch}' does not exist."
              exit 1
          fi

          # Collect hrefs for bulk add
          HREFS_JSON="[]"

          # Process arch-specific RPMs
          for pkg in "${FILES_TO_UPLOAD[@]}"; do
            if [[ "$pkg" == *."$arch".rpm ]]; then
              if [[ "${RPM_FILTER_ENABLED}" == "true" ]]; then
                if ! jq -e --arg rpm "${pkg}" --arg repo "${arch}" \
                  '.[$rpm] // [] | index($repo) != null' <<< "${RPM_REPO_MAP}" >/dev/null; then
                  continue
                fi
              fi

              # Existence and digest check
              set +e
              check_rpm_exists_with_digest "${arch}" "${pkg}"
              status=$?
              set -e
              if [[ $status -eq 0 ]]; then
                echo "Already exists with matching digest: $pkg in ${arch}. Skipping."
                continue
              elif [[ $status -eq 3 ]]; then
                echo "Error: Package exists in ${arch} with different digest: $pkg"
                exit 1
              elif [[ $status -ne 2 ]]; then
                echo "Error: Failed to check existence/digest for ${pkg} in ${arch} (rc=${status})"
                exit 1
              fi

              echo "Uploading $pkg to $arch repository..."
              upload_response=$(pulp_upload_with_retry "${pkg}") || {
                echo "Error: Failed to upload ${pkg} after retries."
                echo "Last response: ${upload_response}"
                exit 1
              }
              href=$(jq -r '.pulp_href' <<< "$upload_response")
              echo "Uploaded $pkg -> $href"

              # Add href to collection
              HREFS_JSON=$(jq --arg href "$href" '. += [{"pulp_href": $href}]' <<< "$HREFS_JSON")

              # Parse NEVRA to capture epoch, version, release for results
              nevra="$(parse_nevra "${pkg}")"
              IFS='|' read -r _name epoch version release _archParsed <<< "${nevra}"
              # Compute local sha256 for results
              local_sha="$(sha256sum "${pkg}" | awk '{print $1}')"

              jq --arg pkg "${pkg}" \
                 --arg rpmname "${_name}" \
                 --arg arch "${arch}" \
                 --arg pulprepo "${PULP_DOMAIN}/${arch}" \
                 --arg epoch "${epoch}" \
                 --arg version "${version}" \
                 --arg release "${release}" \
                 --arg sha256 "${local_sha}" \
                "${JQ_APPEND_RPMFILE}" \
                "$RESULTS_FILE" > tmp.json && mv tmp.json "$RESULTS_FILE"
            fi
            # Upload .noarch.rpm files to this arch repository
            if [[ "$pkg" == *.noarch.rpm ]]; then
              if [[ "${RPM_FILTER_ENABLED}" == "true" ]]; then
                if ! jq -e --arg rpm "${pkg}" --arg repo "${arch}" \
                  '.[$rpm] // [] | index($repo) != null' <<< "${RPM_REPO_MAP}" >/dev/null; then
                  continue
                fi
              fi

              # Existence and digest check against this arch repo
              set +e
              check_rpm_exists_with_digest "${arch}" "${pkg}"
              status=$?
              set -e
              if [[ $status -eq 0 ]]; then
                echo "Already exists with matching digest: $pkg in ${arch}. Skipping."
                continue
              elif [[ $status -eq 3 ]]; then
                echo "Error: Package exists in ${arch} with different digest: $pkg"
                exit 1
              elif [[ $status -ne 2 ]]; then
                echo "Error: Failed to check existence/digest for ${pkg} in ${arch} (rc=${status})"
                exit 1
              fi

              echo "Uploading noarch $pkg to $arch repository..."
              upload_response=$(pulp_upload_with_retry "${pkg}") || {
                echo "Error: Failed to upload ${pkg} after retries."
                echo "Last response: ${upload_response}"
                exit 1
              }
              href=$(jq -r '.pulp_href' <<< "$upload_response")
              echo "Uploaded $pkg -> $href"

              # Add href to collection
              HREFS_JSON=$(jq --arg href "$href" '. += [{"pulp_href": $href}]' <<< "$HREFS_JSON")

              # Parse NEVRA to capture epoch, version, release for results
              nevra="$(parse_nevra "${pkg}")"
              IFS='|' read -r _name epoch version release _archParsed <<< "${nevra}"
              # Compute local sha256 for results
              local_sha="$(sha256sum "${pkg}" | awk '{print $1}')"

              jq --arg pkg "${pkg}" \
                 --arg rpmname "${_name}" \
                 --arg arch "noarch" \
                 --arg pulprepo "${PULP_DOMAIN}/${arch}" \
                 --arg epoch "${epoch}" \
                 --arg version "${version}" \
                 --arg release "${release}" \
                 --arg sha256 "${local_sha}" \
                "${JQ_APPEND_RPMFILE}" \
                "$RESULTS_FILE" > tmp.json && mv tmp.json "$RESULTS_FILE"
            fi
          done

          # Bulk add all collected hrefs to repository via API
          if [[ $(jq 'length' <<< "$HREFS_JSON") -gt 0 ]]; then
            echo "Adding $(jq 'length' <<< "$HREFS_JSON") packages to $arch repository..."
            add_content_to_repo "$arch" "$HREFS_JSON"
          fi
        done

        # Upload and add .src.rpm files to source repository
        SRC_HREFS_JSON="[]"
        for pkg in "${FILES_TO_UPLOAD[@]}"; do
          if [[ "$pkg" == *.src.rpm ]]; then
            if [[ "${RPM_FILTER_ENABLED}" == "true" ]]; then
              if ! jq -e --arg rpm "${pkg}" --arg repo "source" \
                '.[$rpm] // [] | index($repo) != null' <<< "${RPM_REPO_MAP}" >/dev/null; then
                continue
              fi
            fi

            # Existence and digest check against 'source' repo
            set +e
            check_rpm_exists_with_digest "source" "${pkg}"
            status=$?
            set -e
            if [[ $status -eq 0 ]]; then
              echo "Already exists with matching digest: $pkg in source. Skipping."
              continue
            elif [[ $status -eq 3 ]]; then
              echo "Error: Package exists in source with different digest: $pkg"
              exit 1
            elif [[ $status -ne 2 ]]; then
              echo "Error: Failed to check existence/digest for ${pkg} in source (rc=${status})"
              exit 1
            fi
            echo "Uploading $pkg (arch: source)..."
            upload_response=$(pulp_upload_with_retry "${pkg}") || {
              echo "Error: Failed to upload ${pkg} after retries."
              echo "Last response: ${upload_response}"
              exit 1
            }
            href=$(jq -r '.pulp_href' <<< "$upload_response")
            echo "Uploaded $pkg -> $href"

            # Add href to collection
            SRC_HREFS_JSON=$(jq --arg href "$href" '. += [{"pulp_href": $href}]' <<< "$SRC_HREFS_JSON")

            # Parse NEVRA to capture epoch, version, release for results
            nevra="$(parse_nevra "${pkg}")"
            IFS='|' read -r _name epoch version release _archParsed <<< "${nevra}"
            # Compute local sha256 for results
            local_sha="$(sha256sum "${pkg}" | awk '{print $1}')"

            jq --arg pkg "${pkg}" \
               --arg rpmname "${_name}" \
               --arg arch "source" \
               --arg pulprepo "${PULP_DOMAIN}/source" \
               --arg epoch "${epoch}" \
               --arg version "${version}" \
               --arg release "${release}" \
               --arg sha256 "${local_sha}" \
              "${JQ_APPEND_RPMFILE}" \
              "$RESULTS_FILE" > tmp.json && mv tmp.json "$RESULTS_FILE"
          fi
        done

        # Bulk add all source rpms to source repository via API
        if [[ $(jq 'length' <<< "$SRC_HREFS_JSON") -gt 0 ]]; then
          echo "Adding $(jq 'length' <<< "$SRC_HREFS_JSON") source packages to source repository..."
          add_content_to_repo "source" "$SRC_HREFS_JSON"
        fi

        echo "Results written to: $RESULTS_FILE"
    - name: create-trusted-artifact
      computeResources:
        limits:
          memory: 128Mi
          cpu: 250m
        requests:
          memory: 128Mi
          cpu: 250m
      ref:
        resolver: "git"
        params:
          - name: url
            value: "$(params.taskGitUrl)"
          - name: revision
            value: "$(params.taskGitRevision)"
          - name: pathInRepo
            value: stepactions/create-trusted-artifact/create-trusted-artifact.yaml
      params:
        - name: ociStorage
          value: $(params.ociStorage)
        - name: workDir
          value: $(params.dataDir)
        - name: sourceDataArtifact
          value: $(results.sourceDataArtifact.path)
