---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-push-rpms-to-pulp-noarch-all-default-arches
spec:
  description: |
    Run the push-rpms-to-pulp task with an artifact that has only x86_64 + noarch (no other arch
    binaries). Verifies that noarch RPMs are pushed to every default arch repo (from
    DEFAULT_ARCHITECTURES), not only the arches present in the artifact.
  params:
    - name: ociStorage
      description: The OCI repository where the Trusted Artifacts are stored.
      type: string
    - name: ociArtifactExpiresAfter
      description: Expiration date for the trusted artifacts created in the
        OCI repository. An empty string means the artifacts do not expire.
      type: string
      default: "1d"
    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls
      type: string
      default: "--insecure"
    - name: trustedArtifactsDebug
      description: Flag to enable debug logging in trusted artifacts. Set to a non-empty string to enable.
      type: string
      default: ""
    - name: dataDir
      description: The location where data will be stored
      type: string
    - name: DEFAULT_ARCHITECTURES
      description: Comma-delimited default arch list (match push-rpms-to-pulp). Used for expected rpmfile counts.
      type: string
      default: "x86_64,aarch64,s390x,ppc64le"
  tasks:
    - name: setup
      taskSpec:
        results:
          - name: sourceDataArtifact
            type: string
        volumes:
          - name: workdir
            emptyDir: {}
        stepTemplate:
          securityContext:
            runAsUser: 1001
          volumeMounts:
            - mountPath: /var/workdir
              name: workdir
          env:
            - name: HOME
              value: /var/workdir
            - name: IMAGE_EXPIRES_AFTER
              value: $(params.ociArtifactExpiresAfter)
            - name: "ORAS_OPTIONS"
              value: "$(params.orasOptions)"
            - name: "DEBUG"
              value: "$(params.trustedArtifactsDebug)"
        steps:
          - name: setup-values
            image: quay.io/konflux-ci/release-service-utils@sha256:5546fa78d3c88d7b6a2e8cff8902f7757f00541d0bbaf113b9f293133894afa3  # yamllint disable-line rule:line-length
            script: |
              #!/usr/bin/env bash
              set -eux

              mkdir -p "$(params.dataDir)/$(context.pipelineRun.uid)"
              cat > "$(params.dataDir)/$(context.pipelineRun.uid)/snapshot_spec.json" << EOF
              {
                "application": "rpms",
                "artifacts": {},
                "components": [
                  {
                    "containerImage": "quay.io/test/x86andnoarch@sha256:12345",
                    "name": "test",
                    "source": {
                      "git": {
                        "revision": "32c8f78c26e5831a87aa865ea80452fadbb3a95e",
                        "url": "https://gitlab.example.com/rpms/test"
                      }
                    }
                  }
                ]
              }
              EOF
          - name: create-trusted-artifact
            ref:
              name: create-trusted-artifact
            params:
              - name: ociStorage
                value: $(params.ociStorage)
              - name: workDir
                value: $(params.dataDir)
              - name: sourceDataArtifact
                value: $(results.sourceDataArtifact.path)
    - name: run-task
      taskRef:
        name: push-rpms-to-pulp
      params:
        - name: SNAPSHOT_PATH
          value: "$(context.pipelineRun.uid)/snapshot_spec.json"
        - name: PULP_DOMAIN
          value: "mydomain"
        - name: PULP_SECRET_NAME
          value: "pulp-task-pulp-secret"
        - name: resultsDirPath
          value: "$(context.pipelineRun.uid)/results"
        - name: ociStorage
          value: $(params.ociStorage)
        - name: orasOptions
          value: $(params.orasOptions)
        - name: sourceDataArtifact
          value: "$(tasks.setup.results.sourceDataArtifact)=$(params.dataDir)"
        - name: dataDir
          value: $(params.dataDir)
        - name: trustedArtifactsDebug
          value: $(params.trustedArtifactsDebug)
        - name: taskGitUrl
          value: "http://localhost"
        - name: taskGitRevision
          value: "main"
        - name: DEFAULT_ARCHITECTURES
          value: $(params.DEFAULT_ARCHITECTURES)
      runAfter:
        - setup
    - name: check-result
      params:
        - name: sourceDataArtifact
          value: "$(tasks.run-task.results.sourceDataArtifact)=$(params.dataDir)"
        - name: dataDir
          value: $(params.dataDir)
        - name: DEFAULT_ARCHITECTURES
          value: $(params.DEFAULT_ARCHITECTURES)
      taskSpec:
        params:
          - name: sourceDataArtifact
            type: string
          - name: dataDir
            type: string
          - name: DEFAULT_ARCHITECTURES
            type: string
        volumes:
          - name: workdir
            emptyDir: {}
        stepTemplate:
          securityContext:
            runAsUser: 1001
          volumeMounts:
            - mountPath: /var/workdir
              name: workdir
          env:
            - name: IMAGE_EXPIRES_AFTER
              value: $(params.ociArtifactExpiresAfter)
            - name: "ORAS_OPTIONS"
              value: "$(params.orasOptions)"
            - name: "DEBUG"
              value: "$(params.trustedArtifactsDebug)"
        steps:
          - name: use-trusted-artifact
            ref:
              name: use-trusted-artifact
            params:
              - name: workDir
                value: $(params.dataDir)
              - name: sourceDataArtifact
                value: $(params.sourceDataArtifact)
          - name: check-result
            image: quay.io/konflux-ci/release-service-utils@sha256:5546fa78d3c88d7b6a2e8cff8902f7757f00541d0bbaf113b9f293133894afa3  # yamllint disable-line rule:line-length
            script: |
              #!/usr/bin/env bash
              set -eux

              results=$(cat "$(params.dataDir)/$(context.pipelineRun.uid)/results/push-rpms-to-pulp-results.json")
              echo "$results"

              # Parse DEFAULT_ARCHITECTURES (comma-delimited) and compute expected counts
              DEFAULT_ARCHES=()
              IFS=',' read -ra _raw <<< "$(params.DEFAULT_ARCHITECTURES)"
              for x in "${_raw[@]}"; do
                x=$(echo "$x" | xargs)
                [[ -n "$x" ]] && DEFAULT_ARCHES+=("$x")
              done
              expected_noarch_count=${#DEFAULT_ARCHES[@]}
              expected_rpmfiles_count=$((2 + expected_noarch_count))

              rpmfiles_len=$(echo "$results" | jq '.rpmfiles | length')
              if [ "$rpmfiles_len" != "$expected_rpmfiles_count" ]; then
                echo "Error: expected $expected_rpmfiles_count rpmfiles."
                echo "Wanted: 1 x86_64, $expected_noarch_count noarch, 1 source. Actual: $results"
                exit 1
              fi

              # Noarch must be published to every default arch repo
              for arch in "${DEFAULT_ARCHES[@]}"; do
                count=$(echo "$results" | jq --arg a "$arch" \
                  '[.rpmfiles[] | select(.arch == "noarch" and .pulprepo == "mydomain/"+$a)] | length')
                if [ "$count" != "1" ]; then
                  echo "Error: expected exactly one noarch entry for pulprepo mydomain/${arch}, got ${count}"
                  echo "$results"
                  exit 1
                fi
              done

              noarch_len=$(echo "$results" | jq '[.rpmfiles[] | select(.arch == "noarch")] | length')
              if [ "$noarch_len" != "$expected_noarch_count" ]; then
                echo "Error: expected $expected_noarch_count noarch rpmfile entries. Actual:"
                echo "$results"
                exit 1
              fi

              # This test artifact has exactly one x86_64 and one source rpmfile
              if [ "$(echo "$results" | jq '[.rpmfiles[] | select(.arch == "x86_64")] | length')" != "1" ]; then
                echo Error: expected 1 x86_64 rpmfile entry.
                exit 1
              fi
              if [ "$(echo "$results" | jq '[.rpmfiles[] | select(.arch == "source")] | length')" != "1" ]; then
                echo Error: expected 1 source rpmfile entry.
                exit 1
              fi
      runAfter:
        - run-task
