---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: push-oot-kmods-to-azure
spec:
  description: >-
    Task to upload out-of-tree kernel modules to Azure Blob Storage
  params:
    - name: signedKmodsPath
      type: string
      description: Path where the kernel modules are stored relative to the dataDir
    - name: dataDir
      type: string
      description: The absolute path to the working directory
      default: /var/workdir/release
    - name: azureStorageAccount
      type: string
      description: Azure Storage account name
    - name: azureContainer
      type: string
      description: Azure Blob container name
    - name: azureSpSecret
      type: string
      description: Kubernetes Secret with AZURE_TENANT_ID, AZURE_CLIENT_ID, and AZURE_CLIENT_SECRET
    - name: sourceDataArtifact
      type: string
      description: Location of trusted artifacts to be used to populate data directory
      default: ""
    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls
      type: string
      default: ""
    - name: trustedArtifactsDebug
      description: Flag to enable debug logging in trusted artifacts. Set to a non-empty string to enable
      type: string
      default: ""
    - name: taskGitUrl
      type: string
      description: The git repository URL for task and StepAction resolution
      default: https://github.com/konflux-ci/release-service-catalog.git
    - name: taskGitRevision
      type: string
      description: The git revision for task and StepAction resolution
      default: main
  volumes:
    - name: workdir
      emptyDir: {}
    - name: azure-sp-secret-vol
      secret:
        secretName: $(params.azureSpSecret)
  stepTemplate:
    securityContext:
      runAsUser: 1001
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
    env:
      - name: "ORAS_OPTIONS"
        value: "$(params.orasOptions)"
      - name: "DEBUG"
        value: "$(params.trustedArtifactsDebug)"
  steps:
    - name: use-trusted-artifact
      computeResources:
        limits:
          memory: 64Mi
          cpu: 30m
        requests:
          memory: 64Mi
          cpu: 30m
      ref:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: stepactions/use-trusted-artifact/use-trusted-artifact.yaml
      params:
        - name: workDir
          value: $(params.dataDir)
        - name: sourceDataArtifact
          value: $(params.sourceDataArtifact)
    - name: extract-signed-files
      image: quay.io/konflux-ci/release-service-utils@sha256:5546fa78d3c88d7b6a2e8cff8902f7757f00541d0bbaf113b9f293133894afa3
      computeResources:
        limits:
          memory: 256Mi
          cpu: 100m
        requests:
          memory: 256Mi
          cpu: 100m
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        cd "$(params.dataDir)"

        if [ -f signed-kmods.tar.gz ]; then
          echo "Extracting signed-kmods.tar.gz for Azure upload"
          tar -xzf signed-kmods.tar.gz

          # Verify extraction
          ko_count=$(find signed-kmods -name "*.ko" -type f | wc -l)
          echo "Extracted $ko_count .ko files for Azure upload"

          if [ "$ko_count" -eq 0 ]; then
            echo "WARNING: No .ko files found after extraction"
          fi
        else
          echo "No signed-kmods.tar.gz found, assuming files are already extracted"
        fi
    - name: upload-to-azure
      image: mcr.microsoft.com/azure-cli@sha256:ed67c5ef4d0a87396fe39a8114db69b6c351c4af3b17119ac205bb6c0ee3a185
      computeResources:
        limits:
          memory: 512Mi
          cpu: 250m
        requests:
          memory: 512Mi
          cpu: 250m
      volumeMounts:
        - name: azure-sp-secret-vol
          mountPath: /var/secrets/azure-sp
          readOnly: true
      script: |
        #!/usr/bin/env bash
        set -euxo pipefail

        set +x # disable logging of the credentials
        AZURE_TENANT_ID=$(cat /var/secrets/azure-sp/AZURE_TENANT_ID)
        export AZURE_TENANT_ID
        AZURE_CLIENT_ID=$(cat /var/secrets/azure-sp/AZURE_CLIENT_ID)
        export AZURE_CLIENT_ID
        AZURE_CLIENT_SECRET=$(cat /var/secrets/azure-sp/AZURE_CLIENT_SECRET)
        export AZURE_CLIENT_SECRET

        SIGNED_KMODS_FULL_PATH="$(params.dataDir)/$(params.signedKmodsPath)"
        ACCOUNT="$(params.azureStorageAccount)"
        CONTAINER="$(params.azureContainer)"

        # Check if this is a multi-architecture build
        if [ -f "$(params.dataDir)/arch_count.txt" ]; then
            arch_count=$(cat "$(params.dataDir)/arch_count.txt")
            echo "Processing $arch_count architecture(s) for Azure upload"
        else
            echo "No architecture information found, assuming single architecture"
            arch_count=1
        fi

        echo "Logging into Azure..."
        az login --service-principal \
          -u "$AZURE_CLIENT_ID" \
          -p "$AZURE_CLIENT_SECRET" \
          --tenant "$AZURE_TENANT_ID" \
          --allow-no-subscriptions
        set -x # enable logging after the credentials are logged in

        echo "Ensuring container '${CONTAINER}' exists..."
        az storage container create \
          --name "$CONTAINER" \
          --account-name "$ACCOUNT" \
          --auth-mode login >/dev/null

        # Function to upload artifacts for a specific architecture
        upload_arch_artifacts() {
            local arch_name="$1"
            local source_dir="$2"

            echo "Processing Azure upload for architecture directory: $arch_name"

            # Read envfile to get version information and ARCH override
            if [ -f "$source_dir/envfile" ]; then
                # shellcheck source=/dev/null
                . "$source_dir/envfile"
            else
                echo "ERROR: envfile not found in $source_dir"
                return 1
            fi

            # Strip architecture suffix from KERNEL_VERSION (e.g., .aarch64+64k, .x86_64)
            KERNEL_VERSION_CLEAN=$(echo "$KERNEL_VERSION" | \
              sed -E 's/\.(x86_64|amd64|aarch64|arm64|ppc64le|s390x)(\+.*)?$//')
            echo "Original KERNEL_VERSION: $KERNEL_VERSION"
            echo "Cleaned KERNEL_VERSION: $KERNEL_VERSION_CLEAN"

            # Use ARCH from envfile if available and not MULTI_PLATFORM, otherwise fall back to directory name
            if [ -n "${ARCH:-}" ] && [ "$ARCH" != "MULTI_PLATFORM" ]; then
                local final_arch="$ARCH"
                echo "Using architecture: $final_arch (from envfile ARCH variable)"
            else
                local final_arch="$arch_name"
                if [ "${ARCH:-}" = "MULTI_PLATFORM" ]; then
                    echo "Using architecture: $final_arch (ARCH=MULTI_PLATFORM, using directory name)"
                else
                    echo "Using architecture: $final_arch (from directory name)"
                fi
            fi
            local arch_suffix="/${final_arch}"

            AZURE_TARGET_PATH="${DRIVER_VENDOR}/${DRIVER_VERSION}/${KERNEL_VERSION_CLEAN}${arch_suffix}/"
            echo "Azure target path: ${ACCOUNT}/${CONTAINER}/${AZURE_TARGET_PATH}"

            # Upload .ko files (with recursive directory structure support)
            if find "$source_dir" -name "*.ko" -type f | head -1 | grep -q "."; then
                ko_file_count=$(find "$source_dir" -name "*.ko" -type f | wc -l)
                echo "Uploading $ko_file_count .ko files for $arch_name (preserving directory structure)"

                # Show directory structure being uploaded for verification
                echo "Directory structure for $arch_name:"
                find "$source_dir" -name "*.ko" -type f | sort | head -10 | sed 's|^|  |'
                if [ "$(find "$source_dir" -name "*.ko" -type f | wc -l)" -gt 10 ]; then
                    echo "  ... (showing first 10 files)"
                fi

                # Upload each .ko file preserving the directory structure
                cd "$source_dir"
                find . -name "*.ko" -type f | while read -r ko_file; do
                    # Remove the leading "./" from the path and construct blob name
                    relative_path="${ko_file#./}"
                    BLOB_NAME="${AZURE_TARGET_PATH}${relative_path}"
                    echo "Uploading ${ko_file} to ${BLOB_NAME}..."
                    az storage blob upload \
                      --account-name "$ACCOUNT" \
                      --container-name "$CONTAINER" \
                      --name "$BLOB_NAME" \
                      --file "$ko_file" \
                      --auth-mode login \
                      --overwrite
                done
                cd - > /dev/null
            else
                echo "WARNING: No .ko files found for architecture $arch_name"
                return 1
            fi

            # Upload checksum file (always use arch-specific filename)
            if [ -f "$source_dir/signed_kmods_checksums_${arch_name}.txt" ]; then
                echo "Uploading architecture-specific checksums for $arch_name"
                CHECKSUM_BLOB_NAME="${AZURE_TARGET_PATH}signed_kmods_checksums_${arch_name}.txt"
                az storage blob upload \
                  --account-name "$ACCOUNT" \
                  --container-name "$CONTAINER" \
                  --name "$CHECKSUM_BLOB_NAME" \
                  --file "$source_dir/signed_kmods_checksums_${arch_name}.txt" \
                  --auth-mode login \
                  --overwrite
            fi

            # Upload envfile for reference
            if [ -f "$source_dir/envfile" ]; then
                echo "Uploading envfile for $arch_name"
                ENVFILE_BLOB_NAME="${AZURE_TARGET_PATH}envfile"
                az storage blob upload \
                  --account-name "$ACCOUNT" \
                  --container-name "$CONTAINER" \
                  --name "$ENVFILE_BLOB_NAME" \
                  --file "$source_dir/envfile" \
                  --auth-mode login \
                  --overwrite
            fi

            return 0
        }

        # Process architectures
        if [ "$arch_count" -gt 1 ]; then
            echo "Multi-architecture build detected, processing each architecture"

            # Upload summary files first
            if [ -f "${SIGNED_KMODS_FULL_PATH}/signing_summary.txt" ]; then
                # Use first architecture's envfile for base path information
                first_arch_dir=$(find "${SIGNED_KMODS_FULL_PATH}" -mindepth 1 -maxdepth 1 -type d | head -1)
                if [ -n "$first_arch_dir" ] && [ -f "$first_arch_dir/envfile" ]; then
                    # shellcheck source=/dev/null
                    . "$first_arch_dir/envfile"
                    # Strip architecture suffix from KERNEL_VERSION
                    KERNEL_VERSION_CLEAN=$(echo "$KERNEL_VERSION" | \
                      sed -E 's/\.(x86_64|amd64|aarch64|arm64|ppc64le|s390x)(\+.*)?$//')
                    summary_azure_path="${DRIVER_VENDOR}/${DRIVER_VERSION}/${KERNEL_VERSION_CLEAN}/multi-arch-summary/"

                    echo "Uploading multi-architecture summary to Azure: ${ACCOUNT}/${CONTAINER}/${summary_azure_path}"
                    az storage blob upload \
                      --account-name "$ACCOUNT" \
                      --container-name "$CONTAINER" \
                      --name "${summary_azure_path}signing_summary.txt" \
                      --file "${SIGNED_KMODS_FULL_PATH}/signing_summary.txt" \
                      --auth-mode login \
                      --overwrite

                    if [ -f "${SIGNED_KMODS_FULL_PATH}/extraction_summary.txt" ]; then
                        az storage blob upload \
                          --account-name "$ACCOUNT" \
                          --container-name "$CONTAINER" \
                          --name "${summary_azure_path}extraction_summary.txt" \
                          --file "${SIGNED_KMODS_FULL_PATH}/extraction_summary.txt" \
                          --auth-mode login \
                          --overwrite
                    fi
                fi
            fi

            # Process each architecture directory
            for arch_dir in "${SIGNED_KMODS_FULL_PATH}"/*/; do
                if [ -d "$arch_dir" ]; then
                    arch_name=$(basename "$arch_dir")
                    echo "Processing Azure upload for architecture: $arch_name"

                    if upload_arch_artifacts "$arch_name" "$arch_dir"; then
                        echo "Successfully uploaded $arch_name to Azure"
                    else
                        echo "ERROR: Failed to upload $arch_name to Azure"
                        exit 1
                    fi
                fi
            done

        else
            echo "Single architecture build, using standard upload"

            # Get the actual architecture directory name
            arch_dir=$(find "${SIGNED_KMODS_FULL_PATH}" -mindepth 1 -maxdepth 1 -type d | head -1)
            if [ -z "$arch_dir" ]; then
                echo "ERROR: No architecture directory found in ${SIGNED_KMODS_FULL_PATH}"
                exit 1
            fi
            actual_arch=$(basename "$arch_dir")
            echo "Detected architecture: $actual_arch"

            if upload_arch_artifacts "$actual_arch" "$arch_dir"; then
                echo "Successfully uploaded single architecture to Azure: $actual_arch"
            else
                echo "ERROR: Failed to upload single architecture to Azure: $actual_arch"
                exit 1
            fi
        fi

        echo "Azure upload complete for $arch_count architecture(s)."
