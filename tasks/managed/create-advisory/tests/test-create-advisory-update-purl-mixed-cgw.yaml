---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-create-advisory-update-purl-mixed-cgw
spec:
  description: |
    Test create-advisory with mixed components: one with CGW, one without.
    Both components have raw+compressed delivery_format.
    Validates that checksum_map is used for both and PURLs are generated correctly.
  params:
    - name: ociStorage
      description: The OCI repository where the Trusted Artifacts are stored.
      type: string
    - name: ociArtifactExpiresAfter
      description: Expiration date for the trusted artifacts created in the
        OCI repository. An empty string means the artifacts do not expire.
      type: string
      default: "1d"
    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls
      type: string
      default: "--insecure"
    - name: trustedArtifactsDebug
      description: Flag to enable debug logging in trusted artifacts. Set to a non-empty string to enable.
      type: string
      default: ""
    - name: dataDir
      description: The location where data will be stored
      type: string
  tasks:
    - name: setup
      taskSpec:
        results:
          - name: sourceDataArtifact
            type: string
          - name: checksum_map
            type: string
        volumes:
          - name: workdir
            emptyDir: {}
        stepTemplate:
          volumeMounts:
            - mountPath: /var/workdir
              name: workdir
          env:
            - name: IMAGE_EXPIRES_AFTER
              value: $(params.ociArtifactExpiresAfter)
            - name: "ORAS_OPTIONS"
              value: "$(params.orasOptions)"
            - name: "DEBUG"
              value: "$(params.trustedArtifactsDebug)"
          securityContext:
            runAsUser: 1001
        steps:
          - name: create-crs
            image: quay.io/konflux-ci/release-service-utils@sha256:653b4782f0693c031a5d1327c026e6895d90b8126d51d8a3d07ffe940f6721fd
            script: |
              #!/usr/bin/env bash
              set -eux

              mkdir -p "$(params.dataDir)/$(context.pipelineRun.uid)/results"

              cat > "$(params.dataDir)/$(context.pipelineRun.uid)/test_release_plan_admission.json" << EOF
              {
                "apiVersion": "appstudio.redhat.com/v1alpha1",
                "kind": "ReleasePlanAdmission",
                "metadata": {
                  "name": "test",
                  "namespace": "default"
                },
                "spec": {
                  "applications": [
                    "app"
                  ],
                  "policy": "policy",
                  "pipeline": {
                    "pipelineRef": {
                      "resolver": "git",
                      "params": [
                        {
                          "name": "url",
                          "value": "github.com"
                        },
                        {
                          "name": "revision",
                          "value": "main"
                        },
                        {
                          "name": "pathInRepo",
                          "value": "pipeline.yaml"
                        }
                      ]
                    },
                    "serviceAccountName": "sa"
                  },
                  "origin": "dev"
                }
              }
              EOF

              cat > "$(params.dataDir)/$(context.pipelineRun.uid)/test_snapshot_spec.json" << EOF
              {
                "application": "OpenShift",
                "components": [
                  {
                    "name": "cli-tool-a",
                    "repository": "quay.io/redhat-prod/repo"
                  },
                  {
                    "name": "cli-tool-b",
                    "repository": "quay.io/redhat-prod/repo"
                  }
                ]
              }
              EOF

              cat > "$(params.dataDir)/$(context.pipelineRun.uid)/data.json" << EOF
                {
                  "mapping": {
                    "components": [
                      {
                        "name": "cli-tool-a",
                        "staged": {
                          "destination": "cli-tool-a-destination",
                          "version": "2.0.0"},
                        "files": [
                          {
                            "filename": "cli-tool-a-linux",
                            "source": "cli-tool-a-linux-amd64.tar.gz",
                            "arch": "amd64",
                            "os": "linux",
                            "delivery_format": ["compressed", "raw"]
                          },
                          {
                            "filename": "cli-tool-a-windows",
                            "source": "/releases/cli-tool-a-windows-amd64.tar.gz",
                            "arch": "amd64",
                            "os": "windows",
                            "delivery_format": ["compressed"]
                          }
                        ]
                      },
                      {
                        "name": "cli-tool-b",
                        "staged": {
                          "destination": "cli-tool-b-destination",
                          "version": "3.5.0"},
                        "files": [
                          {
                            "filename": "cli-tool-b-darwin",
                            "source": "cli-tool-b-darwin-arm64.tar.gz",
                            "arch": "arm64",
                            "os": "darwin",
                            "delivery_format": ["compressed", "raw"]
                          }
                        ],
                        "contentGateway": {
                          "contentType": "binary",
                          "productName": "CLI Tool B",
                          "productCode": "CLIToolB",
                          "productVersionName": "3.5.0",
                          "filePrefix": "cli-tool-b"
                        }
                      }
                    ]
                  },
                "releaseNotes": {
                  "content": {
                    "artifacts": [
                      { "architecture": "amd64",
                        "component": "cli-tool-a",
                        "os": "linux",
                        "containerImage": "foo",
                        "purl": "placeholder"
                      },
                      { "architecture": "amd64",
                        "component": "cli-tool-a",
                        "os": "windows",
                        "containerImage": "foo",
                        "purl": "placeholder"
                      },
                      { "architecture": "arm64",
                        "component": "cli-tool-b",
                        "os": "darwin",
                        "containerImage": "foo",
                        "purl": "placeholder"
                      }
                    ]
                  }
                },
                "sign": {
                  "configMapName": "cm"
                }
              }
              EOF

              # Create checksum_map mock data file (will be read by oras mock)
              jq -nc '[
                {
                  "component": "cli-tool-a",
                  "files": {
                    "cli-tool-a-linux-amd64.tar.gz": "sha256:aabbccdd11223344556677889900aabbccdd11223344556677889900aabbccdd",
                    "cli-tool-a-linux-amd64": "sha256:11223344556677889900aabbccddaabbccdd11223344556677889900aabbccdd",
                    "cli-tool-a-windows-amd64.zip": "sha256:99887766554433221100ffeeddccbbaa99887766554433221100ffeeddccbbaa"
                  }
                },
                {
                  "component": "cli-tool-b",
                  "files": {
                    "cli-tool-b-darwin-arm64.tar.gz": "sha256:ffeeddccbbaa998877665544332211ffeeddccbbaa998877665544332211aa00",
                    "cli-tool-b-darwin-arm64": "sha256:112233445566778899aabbccddeeff00112233445566778899aabbccddeeff00"
                  }
                }
              ]' > "$(params.dataDir)/mock_checksum_map.json"
              # Output mock OCI reference (oras mock will use the file above)
              echo -n "mock-registry/checksum-map@sha256:mock" | tee "$(results.checksum_map.path)"
          - name: create-trusted-artifact
            ref:
              name: create-trusted-artifact
            params:
              - name: ociStorage
                value: $(params.ociStorage)
              - name: workDir
                value: $(params.dataDir)
              - name: sourceDataArtifact
                value: $(results.sourceDataArtifact.path)
    - name: run-task
      taskRef:
        name: create-advisory
      params:
        - name: releasePlanAdmissionPath
          value: "$(context.pipelineRun.uid)/test_release_plan_admission.json"
        - name: snapshotPath
          value: "$(context.pipelineRun.uid)/test_snapshot_spec.json"
        - name: dataPath
          value: "$(context.pipelineRun.uid)/data.json"
        - name: environment
          value: stage
        - name: resultsDirPath
          value: "$(context.pipelineRun.uid)/results"
        - name: synchronously
          value: "false"
        - name: pipelineRunUid
          value: $(context.pipelineRun.uid)
        - name: ociStorage
          value: $(params.ociStorage)
        - name: orasOptions
          value: $(params.orasOptions)
        - name: sourceDataArtifact
          value: "$(tasks.setup.results.sourceDataArtifact)=$(params.dataDir)/$(context.pipelineRun.uid)"
        - name: dataDir
          value: $(params.dataDir)
        - name: trustedArtifactsDebug
          value: $(params.trustedArtifactsDebug)
        - name: taskGitUrl
          value: "http://localhost"
        - name: taskGitRevision
          value: "main"
        - name: checksum_map
          value: "$(tasks.setup.results.checksum_map)"
      runAfter:
        - setup
    - name: check-result
      params:
        - name: sourceDataArtifact
          value: "$(tasks.run-task.results.sourceDataArtifact)=$(params.dataDir)"
        - name: dataDir
          value: "$(params.dataDir)"
      runAfter:
        - run-task
      taskSpec:
        params:
          - name: sourceDataArtifact
            type: string
          - name: dataDir
            type: string
        volumes:
          - name: workdir
            emptyDir: {}
        stepTemplate:
          volumeMounts:
            - mountPath: /var/workdir
              name: workdir
          env:
            - name: IMAGE_EXPIRES_AFTER
              value: $(params.ociArtifactExpiresAfter)
            - name: "ORAS_OPTIONS"
              value: "$(params.orasOptions)"
            - name: "DEBUG"
              value: "$(params.trustedArtifactsDebug)"
          securityContext:
            runAsUser: 1001
        steps:
          - name: use-trusted-artifact
            ref:
              name: use-trusted-artifact
            params:
              - name: workDir
                value: $(params.dataDir)
              - name: sourceDataArtifact
                value: $(params.sourceDataArtifact)
          - name: check-result
            image: quay.io/konflux-ci/release-service-utils@sha256:653b4782f0693c031a5d1327c026e6895d90b8126d51d8a3d07ffe940f6721fd
            script: |
              #!/usr/bin/env bash
              set -ex

              # Count the number of InternalRequests
              requestsCount=$(kubectl get InternalRequest -o json | jq -r '.items | length')

              # Check if the number of InternalRequests is as expected
              if [ "$requestsCount" -ne 1 ]; then
                echo "Unexpected number of InternalRequests. Expected: 1, Found: $requestsCount"
                exit 1
              fi

              internalRequest=$(kubectl get InternalRequest -o json | jq -r '.items[0]')

              # Check if the 'pipelineRef' field contains the 'create-advisory' pipeline
              if [[ "$(echo "$internalRequest" | jq -r '.spec.pipeline.pipelineRef.params[2].value' )" != \
              "pipelines/internal/create-advisory"* ]]; then
                echo "InternalRequest doesn't contain 'create-advisory' in 'pipeline' field"
                exit 1
              fi

              advisoryJson=$(echo "$internalRequest" | jq -r '.spec.params.advisory_json' | base64 -d | gunzip -c)

              # Parse advisory_json content
              artifacts=$(echo "$advisoryJson" | jq -c '.content.artifacts')

              # Ensure there are exactly 3 artifacts (2 from cli-tool-a, 1 from cli-tool-b)
              artifactCount=$(echo "$artifacts" | jq 'length')
              if [ "$artifactCount" -ne 3 ]; then
                echo "Expected exactly 3 artifacts in advisory_json, but found $artifactCount"
                echo "$artifacts" | jq
                exit 1
              fi

              # Component A (no CGW) - uses staged.version and Customer Portal download URL
              # PURLs now include filename= for unique identification and idempotency matching
              expectedToolALinuxPurl="pkg:generic/cli-tool-a@2.0.0?filename=cli-tool-a-linux-amd64.tar.gz&checksum=sha256:aabbccdd11223344556677889900aabbccdd11223344556677889900aabbccdd&download_url=https://access.redhat.com/downloads"
              expectedToolAWindowsPurl="pkg:generic/cli-tool-a@2.0.0?filename=cli-tool-a-windows-amd64.zip&checksum=sha256:99887766554433221100ffeeddccbbaa99887766554433221100ffeeddccbbaa&download_url=https://access.redhat.com/downloads"
              
              # Component B (with CGW) - uses contentGateway.productVersionName and Developer Portal download URL
              expectedToolBDarwinPurl="pkg:generic/cli-tool-b@3.5.0?filename=cli-tool-b-darwin-arm64.tar.gz&checksum=sha256:ffeeddccbbaa998877665544332211ffeeddccbbaa998877665544332211aa00&download_url=https://developers.redhat.com/products"

              toolALinuxPurl=$(
                echo "$artifacts" | jq -r '.[] | select(.component == "cli-tool-a" and .os == "linux") | .purl')
              toolAWindowsPurl=$(
                echo "$artifacts" | jq -r '.[] | select(.component == "cli-tool-a" and .os == "windows") | .purl')
              toolBDarwinPurl=$(
                echo "$artifacts" | jq -r '.[] | select(.component == "cli-tool-b" and .os == "darwin") | .purl')

              echo "Tool A Linux PURL: $toolALinuxPurl"
              echo "Tool A Windows PURL: $toolAWindowsPurl"
              echo "Tool B Darwin PURL: $toolBDarwinPurl"

              if [ "$toolALinuxPurl" != "$expectedToolALinuxPurl" ]; then
                echo "Unexpected PURL for cli-tool-a Linux artifact"
                echo "Expected: $expectedToolALinuxPurl"
                echo "Got: $toolALinuxPurl"
                exit 1
              fi

              if [ "$toolAWindowsPurl" != "$expectedToolAWindowsPurl" ]; then
                echo "Unexpected PURL for cli-tool-a Windows artifact"
                echo "Expected: $expectedToolAWindowsPurl"
                echo "Got: $toolAWindowsPurl"
                exit 1
              fi

              if [ "$toolBDarwinPurl" != "$expectedToolBDarwinPurl" ]; then
                echo "Unexpected PURL for cli-tool-b Darwin artifact"
                echo "Expected: $expectedToolBDarwinPurl"
                echo "Got: $toolBDarwinPurl"
                exit 1
              fi

              echo "All PURLs validated successfully!"
              echo "✓ Component without CGW used staged.version and checksum"
              echo "✓ Component with CGW used contentGateway.productVersionName and checksum"
              echo "✓ Both raw and compressed files present in checksum_map (only compressed used in PURL)"
  finally:
    - name: cleanup
      taskSpec:
        steps:
          - name: delete-crs
            image: quay.io/konflux-ci/release-service-utils@sha256:653b4782f0693c031a5d1327c026e6895d90b8126d51d8a3d07ffe940f6721fd
            script: |
              #!/usr/bin/env bash
              set -eux

              kubectl delete internalrequests --all
