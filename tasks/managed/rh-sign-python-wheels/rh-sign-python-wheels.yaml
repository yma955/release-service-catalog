---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: rh-sign-python-wheels
  annotations:
    tekton.dev/pipelines.minVersion: "0.12.1"
    tekton.dev/tags: release
spec:
  description: |-
    Task to create and sign SLSA provenance attestations for Python wheels
    and sdists with AWS KMS, producing PEP 740 attestations.
  params:
    - name: secretName
      description: Name of secret containing AWS KMS credentials for signing
      type: string
    - name: retries
      description: Retry cosign N times
      type: string
      default: "3"
    - name: ociStorage
      description: The OCI repository where the Trusted Artifacts are stored
      type: string
      default: "empty"
    - name: ociArtifactExpiresAfter
      description: Expiration date for the trusted artifacts created in the
        OCI repository. An empty string means the artifacts do not expire
      type: string
      default: "1d"
    - name: trustedArtifactsDebug
      description: Flag to enable debug logging in trusted artifacts. Set to a non-empty string to enable
      type: string
      default: ""
    - name: orasOptions
      description: oras options to pass to Trusted Artifacts calls
      type: string
      default: ""
    - name: sourceDataArtifact
      type: string
      description: Location of trusted artifacts to be used to populate data directory
      default: ""
    - name: dataDir
      description: The location where data will be stored
      type: string
      default: /var/workdir/release
    - name: filesDir
      description: The relative path within dataDir where the wheel and sdist files are located
      type: string
      default: files
    - name: taskGitUrl
      type: string
      description: The url to the git repo where the release-service-catalog tasks and stepactions to be used are stored
    - name: taskGitRevision
      type: string
      description: The revision in the taskGitUrl repo to be used
    - name: caTrustConfigMapName
      type: string
      description: The name of the ConfigMap to read CA bundle data from
      default: trusted-ca
    - name: caTrustConfigMapKey
      type: string
      description: The name of the key in the ConfigMap that contains the CA bundle data
      default: ca-bundle.crt
  results:
    - description: Produced trusted data artifact
      name: sourceDataArtifact
      type: string
    - description: The number of attestations created
      name: attestationCount
      type: string
  volumes:
    - name: workdir
      emptyDir: {}
    - name: secret-vol
      secret:
        secretName: $(params.secretName)
        defaultMode: 0444
    - name: trusted-ca
      configMap:
        name: $(params.caTrustConfigMapName)
        items:
          - key: $(params.caTrustConfigMapKey)
            path: ca-bundle.crt
        optional: true

  stepTemplate:
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
      - name: trusted-ca
        mountPath: /mnt/trusted-ca
        readOnly: true
    env:
      - name: IMAGE_EXPIRES_AFTER
        value: $(params.ociArtifactExpiresAfter)
      - name: "ORAS_OPTIONS"
        value: "$(params.orasOptions)"
      - name: "DEBUG"
        value: "$(params.trustedArtifactsDebug)"
    securityContext:
      runAsUser: 1001
  steps:
    - name: use-trusted-artifact
      computeResources:
        limits:
          memory: 64Mi
        requests:
          memory: 64Mi
          cpu: 30m
      ref:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: stepactions/use-trusted-artifact/use-trusted-artifact.yaml
      params:
        - name: workDir
          value: $(params.dataDir)
        - name: sourceDataArtifact
          value: $(params.sourceDataArtifact)
    - name: attest-blob
      image: quay.io/konflux-ci/release-service-utils@sha256:288a903105481b1ea11e558b179cf4010d66a3fa4f4ff22765a256668471554b
      computeResources:
        limits:
          memory: 2.5Gi
        requests:
          memory: 2.5Gi
          cpu: "2"
      volumeMounts:
        - name: secret-vol
          mountPath: "/etc/secrets"
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        # Load AWS KMS credentials
        AWS_DEFAULT_REGION="$(cat /etc/secrets/AWS_DEFAULT_REGION)"
        AWS_ACCESS_KEY_ID="$(cat /etc/secrets/AWS_ACCESS_KEY_ID)"
        AWS_SECRET_ACCESS_KEY="$(cat /etc/secrets/AWS_SECRET_ACCESS_KEY)"
        export AWS_DEFAULT_REGION AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY

        SIGN_KEY="$(cat /etc/secrets/SIGN_KEY)"
        REKOR_URL_PATH="/etc/secrets/REKOR_URL"
        if [ -f "${REKOR_URL_PATH}" ] && [ -s "${REKOR_URL_PATH}" ]; then
          REKOR_URL="$(cat /etc/secrets/REKOR_URL)"
        fi

        set -x

        FILES_DIR=$(params.dataDir)/$(params.filesDir)

        # Get release timestamp
        RELEASE_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)

        echo "=== Attestation Generation and Signing Step ==="
        echo "Release timestamp: ${RELEASE_TIME}"
        echo "Files directory: ${FILES_DIR}"

        if [ ! -d "${FILES_DIR}" ]; then
            echo "ERROR: Files directory does not exist: ${FILES_DIR}"
            exit 1
        fi

        # Function to run cosign with retries
        run_cosign() {
            local attempt=0
            local backoff1=2
            local backoff2=3
            until [ "$attempt" -gt "$(params.retries)" ]; do
                if cosign "$@"; then
                    return 0
                fi
                sleep $backoff2
                # Fibonacci backoff
                local old_backoff1=$backoff1
                backoff1=$backoff2
                backoff2=$((old_backoff1 + backoff2))
                attempt=$((attempt+1))
            done
            echo "Max retries exceeded for cosign command"
            return 1
        }

        ATT_COUNT=0
        SIGNED_COUNT=0

        cd "${FILES_DIR}"

        echo ""
        echo "Files in directory:"
        ls -lah

        echo ""
        echo "Processing wheel and sdist files..."

        # Configure Rekor arguments
        declare -a REKOR_ARGS=()
        if [ -v REKOR_URL ]; then
            REKOR_ARGS+=("-y" "--rekor-url=$REKOR_URL")
        else
            REKOR_ARGS+=("--tlog-upload=false")
        fi

        # Process .whl and .tar.gz files
        shopt -s nullglob
        for WHEEL in *.whl *.tar.gz; do
          # Skip if no files match
          if [ ! -f "${WHEEL}" ]; then
            echo "Skipping non-existent file: ${WHEEL}"
            continue
          fi

          echo ""
          echo "Processing: ${WHEEL}"

          # Calculate wheel hash
          WHEEL_SHA256=$(sha256sum "${WHEEL}" | cut -d' ' -f1)
          echo "  SHA256: ${WHEEL_SHA256}"

          # Create SLSA provenance predicate
          PREDICATE_FILE="/tmp/${WHEEL}.predicate.json"
          cat > "${PREDICATE_FILE}" <<EOF
        {
          "_type": "https://in-toto.io/Statement/v0.1",
          "predicateType": "https://slsa.dev/provenance/v0.2",
          "subject": [
            {
              "name": "${WHEEL}",
              "digest": {
                "sha256": "${WHEEL_SHA256}"
              }
            }
          ],
          "predicate": {
            "builder": {
              "id": "https://konflux-ci.dev/calunga"
            },
            "buildType": "https://konflux-ci.dev/PythonWheelBuild@v1",
            "metadata": {
              "buildFinishedOn": "${RELEASE_TIME}",
              "completeness": {
                "parameters": true,
                "environment": true,
                "materials": true
              },
              "reproducible": true
            }
          }
        }
        EOF

          ATT_FILE="${WHEEL}.attestation"
          DSSE_FILE="/tmp/${WHEEL}.dsse.json"

          # Sign the attestation with cosign using AWS KMS key
          echo "Signing attestation with cosign (AWS KMS)"
          if run_cosign attest-blob "${WHEEL}" \
            --predicate="${PREDICATE_FILE}" \
            --type=https://slsa.dev/provenance/v0.2 \
            --key "$SIGN_KEY" \
            --yes \
            "${REKOR_ARGS[@]}" \
            --output-file="${DSSE_FILE}" 2>&1; then
            echo "Signed DSSE attestation created"

            # Convert DSSE to PEP 740 format using jq
            echo "Converting to PEP 740 format..."
            jq '{
              version: 1,
              verification_material: null,
              envelope: {
                statement: .payload,
                signature: .signatures[0].sig
              }
            }' "${DSSE_FILE}" > "${ATT_FILE}"
            echo "Created PEP 740 attestation: ${ATT_FILE}"
            SIGNED_COUNT=$((SIGNED_COUNT + 1))
            rm -f "${DSSE_FILE}"
          else
            echo "ERROR: Failed to sign attestation for ${WHEEL}"
            exit 1
          fi

          ATT_COUNT=$((ATT_COUNT + 1))
          rm -f "${PREDICATE_FILE}"
        done

        echo ""
        echo "=========================================="
        echo "Attestation Generation Summary:"
        echo "  Total attestations: ${ATT_COUNT}"
        echo "  Signed (PEP 740): ${SIGNED_COUNT}"
        echo "=========================================="

        echo -n "${ATT_COUNT}" > "$(results.attestationCount.path)"

        echo ""
        echo "Final files in directory (wheels, signatures, and attestations):"
        ls -lah
    - name: create-trusted-artifact
      computeResources:
        limits:
          memory: 128Mi
        requests:
          memory: 128Mi
          cpu: 250m
      ref:
        resolver: "git"
        params:
          - name: url
            value: "$(params.taskGitUrl)"
          - name: revision
            value: "$(params.taskGitRevision)"
          - name: pathInRepo
            value: stepactions/create-trusted-artifact/create-trusted-artifact.yaml
      params:
        - name: ociStorage
          value: $(params.ociStorage)
        - name: workDir
          value: $(params.dataDir)
        - name: sourceDataArtifact
          value: $(results.sourceDataArtifact.path)
