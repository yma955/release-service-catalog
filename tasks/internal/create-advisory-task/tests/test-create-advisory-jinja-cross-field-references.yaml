---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-create-advisory-jinja-cross-field-references
spec:
  description: |
    Verifies Jinja with cross field references rendering in the create-advisory task
    ensuring advisory spec references resolve correctly in generated fields.
  tasks:
    - name: run-task
      taskRef:
        name: create-advisory-task
      params:
        - name: advisory_json
          value: >-
            
          # advisory_json string before `gzip -c|base64 -w 0` encoding:
          # {"product_id":123, "product_name":"Red Hat Product", "product_version":"9.0.1", "product_stream":"tp1",
          # "cpe":"cpe:/a:example:product:el8", "type":"RHSA", "synopsis":"{% set version_str =
          # advisory.spec.product_version | string() %}{% set major = version_str.split('.')[0] %}{% if
          # advisory.spec.type == 'RHSA' %}{{ advisory.spec.severity }}: RHEL {{ major }} security update{% else
          # %}RHEL {{ major }} bug fix update{% endif %}", "topic":"Updated {{ advisory.spec.product_name }} {{
          # advisory.spec.product_version }} available", "description":"Security update for {{
          # advisory.spec.product_name }} for advisory {{ advisory_name }}", "solution":"Update your containers",
          # "severity":"Moderate", "references":["https://docs.example.com/notes"],
          # "content":{"images":[{"containerImage":"quay.io/example/openstack@sha256:abc123",
          # "repository":"rhosp16-rhel8/openstack", "tags":["latest"], "architecture":"amd64",
          # "purl":"pkg:example/openstack@256:abcde?repository_url=quay.io/example/rhosp16-rhel8",
          # "cves":{"fixed":{"CVE-2022-1234":{"packages":["pkg:golang/golang.org/x/net/http2@1.11.1"]}}}}]}}
        - name: componentGroup
          value: "test-app"
        - name: origin
          value: "jinja-tenant"
        - name: config_map_name
          value: "create-advisory-test-cm"
        - name: advisory_secret_name
          value: "create-advisory-secret"
        - name: errata_secret_name
          value: "create-advisory-errata-secret"
        - name: internalRequestPipelineRunName
          value: $(context.pipelineRun.name)
    - name: check-result
      runAfter:
        - run-task
      params:
        - name: result
          value: $(tasks.run-task.results.result)
        - name: advisory_url
          value: $(tasks.run-task.results.advisory_url)
      taskSpec:
        params:
          - name: result
            type: string
          - name: advisory_url
            type: string
        steps:
          - name: check-result
            image: quay.io/konflux-ci/release-service-utils@sha256:a9fc6af1db5fefe43c655b3241326e8115cd9569b810bac7effb33b45dd2a855
            script: |
              #!/usr/bin/env bash
              set -ex

              echo Test that result is success
              printf "%s\n" "$(params.result)" | grep -i 'success'

              echo Test that advisory_url was set
              test -n "$(params.advisory_url)"
