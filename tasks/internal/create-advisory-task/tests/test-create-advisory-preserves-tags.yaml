---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-create-advisory-preserves-tags
spec:
  description: |
    Test that tags are preserved correctly during JSON to YAML conversion.
    Verifies that tag values like "33158e1" don't get converted to integers
    like 331580 in the YAML.
  tasks:
    - name: run-task
      taskRef:
        name: create-advisory-task
      params:
        - name: advisory_json
          value: >-
            
          # advisory_json string before `gzip -c|base64 -w 0` encoding:
          # {"product_id":123, "product_name":"preserves tags", "product_version":"1.0",
          # "product_stream":"stream1", "cpe":"cpe:/a:test:product", "type":"RHEA", "synopsis":"Test synopsis",
          # "topic":"Test topic", "description":"Test description", "solution":"Test solution",
          # "references":["https://example.com"],
          # "content":{"images":[{"containerImage":"quay.io/example/image@sha256:abc123",
          # "repository":"example/repo", "tags":["33158e1", "1.0.0", "latest", "v2.0e10"], "architecture":"amd64",
          # "purl":"pkg:example/image@sha256:abc123"}]}}
        - name: componentGroup
          value: "test-app"
        - name: origin
          value: "tag-test-tenant"
        - name: config_map_name
          value: "create-advisory-test-cm"
        - name: advisory_secret_name
          value: "create-advisory-secret"
        - name: errata_secret_name
          value: "create-advisory-errata-secret"
        - name: internalRequestPipelineRunName
          value: $(context.pipelineRun.name)
    - name: check-result
      runAfter:
        - run-task
      params:
        - name: result
          value: $(tasks.run-task.results.result)
        - name: advisory_url
          value: $(tasks.run-task.results.advisory_url)
        - name: advisory_internal_url
          value: $(tasks.run-task.results.advisory_internal_url)
      taskSpec:
        params:
          - name: result
            type: string
          - name: advisory_url
            type: string
          - name: advisory_internal_url
            type: string
        steps:
          - name: check-result
            image: quay.io/konflux-ci/release-service-utils@sha256:a9fc6af1db5fefe43c655b3241326e8115cd9569b810bac7effb33b45dd2a855
            script: |
              #!/usr/bin/env bash
              set -ex

              echo Test that task succeeded
              test "$(params.result)" == Success

              echo Test that advisory_url was set
              test -n "$(params.advisory_url)"
