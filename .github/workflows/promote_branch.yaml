---
name: Promote branch
on:
  workflow_dispatch:
    inputs:
      promotion-type:
        description: The type of promotion to perform
        type: choice
        required: true
        default: development-to-staging
        options:
          - development-to-staging
          - staging-to-production
      force-to-staging:
        description: |
          Force to staging: Allow promotion to staging even if staging and production differ
        type: boolean
        required: true
        default: false
      override:
        description: |
          Override: Allow promotion to production even if the change has not been in staging for one
          week
        type: boolean
        required: true
        default: false
      dry-run:
        description: |
          Dry run: Print out the changes that would be promoted but do not perform the git push
        type: boolean
        required: true
        default: false
      create-release-service-infra-pr:
        description: |
          Create Release Service Infra PR: Create a PR to infra-deployments to promote the Release Service
        type: boolean
        required: true
        default: false
      create-internal-services-infra-pr:
        description: |
          Create Internal Services Infra PR: Create a PR to infra-deployments to promote the Internal Services
        type: boolean
        required: true
        default: false
      update-jira-tickets:
        description: |
          Update Jira tickets: Update Jira tickets that have been promoted
        type: boolean
        required: true
        default: false
      send-email-report:
        description: |
          Send email report: Generate and send AI-powered email report after promotion
        type: boolean
        required: true
        default: false
      override-hotfix-check:
        description: |
          Override hotfix check: If true, do not fail when hotfix commits are found that are missing in the source
          branch. Warning: If you select this, you risk reintroducing a bug that was hot fixed. Only use this option
          if you know the bug is fixed in the source branch (just perhaps in a different way)
        type: boolean
        required: true
        default: false
jobs:
  promote-branch:
    name: Promote Branch
    runs-on: ubuntu-latest
    outputs:
      parsed_tickets_file: ${{ steps.promote.outputs.parsed_tickets_file }}
    steps:
      - name: Checkout code
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4
        with:
          fetch-depth: 0  # Fetch full history for commit analysis
      
      - name: Capture commits for report (if email report requested)
        if: inputs.send-email-report == true
        id: capture-commits
        run: |
          # Determine source and target branches
          if [ "${{ inputs.promotion-type }}" = "development-to-staging" ]; then
            FROM_BRANCH="development"
            TO_BRANCH="staging"
          else
            FROM_BRANCH="staging"
            TO_BRANCH="production"
          fi
          
          # Fetch latest remote state
          git fetch --no-tags origin
          
          # Get commit range and store in file for later use
          echo "FROM_BRANCH=$FROM_BRANCH" >> $GITHUB_ENV
          echo "TO_BRANCH=$TO_BRANCH" >> $GITHUB_ENV
          
          # Capture the commit range before promotion
          COMMIT_RANGE="origin/$TO_BRANCH..origin/$FROM_BRANCH"
          echo "COMMIT_RANGE=$COMMIT_RANGE" >> $GITHUB_ENV
          
          # Get commit hashes and store them
          COMMITS=$(git log --pretty=format:"%H" $COMMIT_RANGE | head -50)
          echo "COMMITS<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # Store commits in a file for manual recovery
          echo "$COMMITS" > /tmp/promoted_commits.txt
          
          # Also capture the current HEAD of source branch for reference
          SOURCE_HEAD=$(git rev-parse origin/$FROM_BRANCH)
          echo "SOURCE_HEAD=$SOURCE_HEAD" >> $GITHUB_ENV
          
          echo "📊 Captured $(echo "$COMMITS" | wc -l) commits for report generation"
          echo "📊 Source branch HEAD: $SOURCE_HEAD"

      - name: Run branch promotion script
        id: promote
        run: |
          .github/scripts/promote_branch.sh --promotion-type $PROMOTION_TYPE --force-to-staging $FORCE \
            --override $OVERRIDE --dry-run $DRY --override-hotfix-check $OVERRIDE_HOTFIX
        env:
          PROMOTION_TYPE: ${{ inputs.promotion-type }}
          FORCE: ${{ inputs.force-to-staging }}
          OVERRIDE: ${{ inputs.override }}
          DRY: ${{ inputs.dry-run }}
          OVERRIDE_HOTFIX: ${{ inputs.override-hotfix-check }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Create Release Controller PR to infra-deployments
        if: |
          steps.promote.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_ACTIONS_URL: ${{ vars.RELEASE_AUTOMATIONS_ACTIONS_URL }}
        run: |
          PROMOTE_RELEASE_SERVICE=${{ inputs.create-release-service-infra-pr }}
          PROMOTE_INTERNAL_SERVICES=${{ inputs.create-internal-services-infra-pr }}

          CURL_TIMEOUT=20
          CURL_RETRY=5

          cat > HEADERS << EOF
          Accept: application/vnd.github+json
          Authorization: Bearer ${GITHUB_TOKEN}
          X-GitHub-Api-Version: 2022-11-28
          EOF

          # general curl configuration
          cat > ~/.curlrc << EOF
          # use HEADERS file
          -H @HEADERS
          # follow redirects
          --location
          # silent
          --silent
          # max timeout
          --max-time ${CURL_TIMEOUT}
          --retry ${CURL_RETRY}
          EOF

          if [ "$PROMOTE_RELEASE_SERVICE" == "true" ] || [ "$PROMOTE_INTERNAL_SERVICES" == "true" ]; then

            curl \
              "${GH_ACTIONS_URL}/workflows/promote_controller.yaml/dispatches" \
              -d '{
                "ref":"main",
                "inputs": {
                  "promotion-type": "${{ inputs.promotion-type }}",
                  "release-service":"'$PROMOTE_RELEASE_SERVICE'",
                  "internal-services": "'$PROMOTE_INTERNAL_SERVICES'"
                }
              }'

            # get the workflow run id
            ID=""
            while [[ ! "$ID" =~ ^[0-9]+$ ]]; do
              ID=$(curl \
                "${GH_ACTIONS_URL}/workflows/promote_controller.yaml/runs?status=in_progress" \
                  |jq -r .workflow_runs[0].id)
              sleep 1
            done

            STATUS=""
            # wait for the run status 
            while [ "$STATUS" != "completed" ]; do
              STATUS=$(curl "${GH_ACTIONS_URL}/runs/$ID" |jq -r .status)
              sleep 1
            done

            CONCLUSION=$(curl "${GH_ACTIONS_URL}/runs/$ID" |jq -r .conclusion)

            # print logs
            curl "${GH_ACTIONS_URL}/runs/$ID/logs" \
             | gunzip - |awk '{print substr($0, 30)}'

            echo "Promotion of controllers concluded with \"$CONCLUSION\""
          fi
      - name: Update Jira ticket(s)
        if: |
          steps.promote.outcome == 'success' && 
          inputs.update-jira-tickets == true &&
          steps.promote.outputs.parsed_tickets_file != ''
        uses: konflux-ci/release-service-automations/jira-ci@2a074bf7270b4212038f4f8e06dff76b8760254b  # main
        with:
          jira_url: "https://issues.redhat.com"
          promotion_type: ${{ inputs.promotion-type }}
          metadata_file: ${{ steps.promote.outputs.parsed_tickets_file }}
          jira_token: ${{ secrets.JIRA_TOKEN }}
          dry_run: ${{ inputs.dry-run }}
          
      - name: Set up Python
        if: |
          steps.promote.outcome == 'success' && 
          inputs.send-email-report == true
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        if: |
          steps.promote.outcome == 'success' && 
          inputs.send-email-report == true
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml markdown google-generativeai
      
      - name: Generate promotion report
        if: |
          steps.promote.outcome == 'success' && 
          inputs.send-email-report == true
        id: generate-report
        continue-on-error: true
        run: |
          # Create secret files securely
          echo "${{ secrets.GEMINI_API_KEY }}" > /tmp/gemini_api_key
          echo "${{ secrets.SMTP_USERNAME }}" > /tmp/smtp_username  
          echo "${{ secrets.SMTP_PASSWORD }}" > /tmp/smtp_password
          echo "${{ secrets.GH_TOKEN }}" > /tmp/gh_token
          chmod 600 /tmp/gemini_api_key /tmp/smtp_username /tmp/smtp_password /tmp/gh_token
          
          # Generate the promotion report using captured commit range
          python .github/scripts/generate_promotion_report.py $FROM_BRANCH $TO_BRANCH --commit-range "$COMMIT_RANGE"
          
          # Clean up secret files
          rm -f /tmp/gemini_api_key /tmp/smtp_username /tmp/smtp_password /tmp/gh_token
        env:
          # Non-sensitive configuration
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # Sensitive secrets mounted as files per security team recommendation
          GEMINI_API_KEY_FILE: /tmp/gemini_api_key
          SMTP_USERNAME_FILE: /tmp/smtp_username
          SMTP_PASSWORD_FILE: /tmp/smtp_password
          GH_TOKEN_FILE: /tmp/gh_token
      
      - name: Report generation status
        if: always() && inputs.send-email-report == true
        run: |
          if [ "${{ steps.promote.outcome }}" = "success" ]; then
            if [ "${{ steps.generate-report.outcome }}" = "success" ]; then
              echo "✅ Promotion and email report completed successfully"
            else
              echo "⚠️ WARNING: Promotion succeeded but email report generation failed"
              echo "📧 Report can be generated manually using commit range: $COMMIT_RANGE"
              echo "📖 See documentation for manual report generation steps"
            fi
          else
            echo "❌ Promotion failed - no report generated"
          fi
