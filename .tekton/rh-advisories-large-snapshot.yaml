---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/konflux-ci/release-service-catalog?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "2"
    # Only trigger on specific comment (not on edits)
    # Uses regex to allow trailing whitespace for better UX
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "issue_comment" && body.action == "created" && body.comment.body.matches("^/test-large-snapshot\\s*$")
  creationTimestamp:
  labels:
    appstudio.openshift.io/application: release-service-catalog
    appstudio.openshift.io/component: release-service-catalog
    pipelines.appstudio.openshift.io/type: test
  name: rh-advisories-large-snapshot-test
  # IMPORTANT: Hardcoded namespace for staging cluster (stg-rh01)
  # This test MUST run in rhtap-release-2-tenant where secrets exist
  # Required permissions: PipelineRun creation, secret access
  # Do NOT modify unless coordinating with Release Service team
  namespace: rhtap-release-2-tenant
spec:
  params:
    - name: SNAPSHOT
      value: |
        {
          "application": "release-service-catalog",
          "artifacts": {},
          "components": [
            {
              "containerImage": "quay.io/centos/centos:stream9",
              "name": "test-component",
              "source": {
                "git": {
                  "revision": "{{revision}}",
                  "url": "{{source_url}}"
                }
              }
            }
          ]
        }
    - name: PIPELINE_TEST_SUITE
      value: "rh-advisories-large-snapshot"
    # IMPORTANT: Hardcoded secret names (must exist in rhtap-release-2-tenant)
    # These secrets are pre-created and managed by the Release Service team
    # vault-password-secret: Ansible vault password for decrypting test secrets
    # github-token-secret: GitHub PAT for repository operations
    # kubeconfig-secret: Kubeconfig for staging cluster access
    - name: VAULT_PASSWORD_SECRET_NAME
      value: 'vault-password-secret'
    - name: GITHUB_TOKEN_SECRET_NAME
      value: 'github-token-secret'
    - name: KUBECONFIG_SECRET_NAME
      value: 'kubeconfig-secret'
  
  pipelineRef:
    resolver: git
    params:
      - name: url
        value: https://github.com/konflux-ci/release-service-catalog
      - name: revision
        value: '{{revision}}'
      - name: pathInRepo
        value: integration-tests/pipelines/e2e-tests-staging-pipeline.yaml
  
  workspaces:
    - name: workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
  
  # Extended timeout for large snapshot tests (8 hours)
  timeouts:
    pipeline: 8h0m0s
